# Project Configuration Template for Research Projects
# Copy this file to the root of your research project and customize

project:
  name: "research"
  type: "r_analysis"                   # r_shiny | r_analysis | python | mixed
  description: "Academic research projects and statistical analyses"
  owner: "Dr. Cheng Che"
  version: "1.0.0"

  # Principle system configuration
  principles:
    core_path: "global_scripts/00_principles"
    local_path: "global_scripts/00_principles_local"
    auto_sync: true
    sync_interval_hours: 24

    # Principle versioning
    core_version: "1.0"
    local_version: "1.0"

  # Lab/entity configuration
  entities:
    type: "labs"                       # Type of entities (labs instead of companies)
    list:
      - name: "kehchunglin_lab"
        code: "kcl"
        display_name: "Keh-Chung Lin Lab"
        active: true
        metadata:
          institution: "National Taiwan University"
          research_area: "Psychometrics"
          irb_protocol: "IRB-2024-001"

      - name: "psychometrics_lab"
        code: "psych"
        display_name: "Psychometrics Research Lab"
        active: true
        metadata:
          institution: "Academia Sinica"
          research_area: "Statistical Modeling"
          irb_protocol: "IRB-2024-002"

  # Path patterns for project discovery
  app_discovery:
    # Patterns to identify research projects
    patterns:
      - "*_lab"
      - "*_study"
      - "*_analysis"
      - "*/rawdata"                    # Directories with raw data

    # Configuration file for sub-projects
    config_file: ".project_config"

    # Patterns to exclude
    exclude_patterns:
      - "archive"
      - "Literature"                   # EndNote library
      - "backup"
      - ".Rproj.user"
      - "packrat"

  # Project-specific parameters
  parameters:
    # Base path
    base_path: "${WORKSPACE_ROOT}/projects/research"

    # Standard research directories
    rawdata_path: "rawdata"
    output_path: "output"
    figures_path: "output/figures"
    tables_path: "output/tables"
    documents_path: "documents"
    functions_path: "functions"

    # Reproducibility settings
    reproducibility:
      set_seed: true
      default_seed: 42
      record_session_info: true

    # Statistical software
    statistical_software:
      r_version: "4.3.0"
      required_packages:
        - "tidyverse"
        - "lavaan"
        - "mirt"
        - "psych"
        - "ggplot2"
        - "knitr"
        - "rmarkdown"

    # Output formats
    output_formats:
      default: "pdf"
      supported:
        - "pdf"
        - "html"
        - "docx"
        - "latex"

  # Environment variables
  environment:
    # Required environment variables
    required_vars:
      - "R_LIBS_USER"                  # R library path

    # Optional environment variables
    optional_vars:
      - "RSTUDIO_PANDOC"               # Pandoc path
      - "TEXINPUTS"                    # LaTeX inputs

  # Analysis workflow
  workflow:
    # Standard script naming (using numbered prefixes)
    script_pattern: "\\d{3}_.*\\.R"

    # Script execution order
    execution_order:
      - "000_setup.R"                  # Environment setup
      - "001_data_import.R"            # Data import
      - "002_data_cleaning.R"          # Data cleaning
      - "003_descriptive_stats.R"      # Descriptive statistics
      - "004_main_analysis.R"          # Main analysis
      - "005_visualization.R"          # Visualizations
      - "006_reporting.R"              # Report generation

    # Function organization
    function_organization:
      directory: "functions"
      pattern: "fn_.*\\.R"
      auto_source: true

  # Academic standards
  academic:
    # Citation management
    citation:
      manager: "EndNote"
      library_path: "Literature"
      style: "APA"

    # Data management
    data_management:
      # Participant privacy
      anonymize_data: true
      secure_storage: true
      retention_years: 5

      # Data sharing
      share_data: true
      repository: "OSF"                # Open Science Framework

    # Reproducibility
    reproducibility:
      # Version control
      use_git: true

      # Documentation
      document_all_steps: true
      include_session_info: true

      # Code availability
      publish_code: true
      code_repository: "GitHub"

    # Ethics compliance
    ethics:
      irb_required: true
      informed_consent: true
      data_protection: true

  # Reporting configuration
  reporting:
    # Report templates
    templates:
      - "weekly_report.Rmd"
      - "monthly_report.Rmd"
      - "manuscript.Rmd"

    # Output settings
    output:
      format: "pdf_document"
      keep_tex: true
      fig_caption: true

  # Testing configuration
  testing:
    framework: "testthat"
    test_directories:
      - "tests"

    # Statistical validation
    statistical_tests:
      check_distributions: true
      validate_models: true
      sensitivity_analysis: true

  # Documentation
  documentation:
    readme_path: "README.md"
    principles_docs: "global_scripts/00_principles"
    codebook_path: "documents/codebook.md"

  # Logging
  logging:
    level: "INFO"
    destination: "file"
    log_path: "logs"

# Metadata
metadata:
  created_date: "2025-10-03"
  last_modified: "2025-10-03"
  config_version: "1.0"
  schema_version: "1.0"
  irb_approval_date: "2024-01-15"
  project_start_date: "2024-02-01"
