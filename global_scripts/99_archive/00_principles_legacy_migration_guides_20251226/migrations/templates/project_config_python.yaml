# Project Configuration Template for Python Projects
# Copy this file to the root of your python_projects directory and customize

project:
  name: "python_projects"
  type: "python"                       # r_shiny | r_analysis | python | mixed
  description: "Python utility tools and data science projects"
  owner: "Dr. Cheng Che"
  version: "1.0.0"

  # Principle system configuration
  principles:
    core_path: "global_scripts/00_principles"
    local_path: "global_scripts/00_principles_local"
    auto_sync: true
    sync_interval_hours: 24

    # Principle versioning
    core_version: "1.0"
    local_version: "1.0"

  # Tool/project configuration
  entities:
    type: "tools"                      # Type of entities (tools/packages)
    list:
      - name: "pdf_to_latex"
        code: "pdf2tex"
        display_name: "PDF to LaTeX Converter"
        active: true
        metadata:
          category: "document_processing"
          language: "python"
          license: "MIT"

      - name: "graphiti"
        code: "graphiti"
        display_name: "Graphiti Knowledge Graph"
        active: true
        metadata:
          category: "knowledge_graph"
          language: "python"
          license: "Apache-2.0"

      - name: "recode_word"
        code: "recode"
        display_name: "Word Document Recoder"
        active: true
        metadata:
          category: "document_processing"
          language: "python"
          license: "MIT"

  # Path patterns for project discovery
  app_discovery:
    # Patterns to identify Python projects
    patterns:
      - "*/setup.py"
      - "*/pyproject.toml"
      - "*/requirements.txt"
      - "*/Pipfile"

    # Patterns to exclude
    exclude_patterns:
      - "venv"
      - ".venv"
      - "env"
      - "__pycache__"
      - ".pytest_cache"
      - ".mypy_cache"
      - "*.egg-info"
      - "dist"
      - "build"

  # Project-specific parameters
  parameters:
    # Base path
    base_path: "${WORKSPACE_ROOT}/projects/python_projects"

    # Standard Python directories
    src_path: "src"
    tests_path: "tests"
    docs_path: "docs"
    data_path: "data"
    output_path: "output"

    # Virtual environment
    venv:
      path: "venv"
      python_version: "3.11"

    # Package management
    package_manager: "pip"             # pip | poetry | pipenv

    # Python configuration
    python:
      version: "3.11"
      encoding: "utf-8"

      # Code style
      style:
        formatter: "black"
        line_length: 88
        linter: "ruff"
        type_checker: "mypy"

      # Testing
      testing:
        framework: "pytest"
        coverage_threshold: 80

      # Documentation
      documentation:
        tool: "sphinx"
        format: "google"               # google | numpy | restructuredtext

  # Environment variables
  environment:
    # Required environment variables
    required_vars:
      - "PYTHONPATH"

    # Optional environment variables
    optional_vars:
      - "OPENAI_API_KEY"               # For AI-powered tools
      - "ANTHROPIC_API_KEY"            # For Claude integration
      - "HF_TOKEN"                     # Hugging Face token

  # Development workflow
  workflow:
    # Pre-commit hooks
    pre_commit:
      enabled: true
      hooks:
        - "black"                      # Code formatting
        - "ruff"                       # Linting
        - "mypy"                       # Type checking
        - "pytest"                     # Run tests

    # Continuous Integration
    ci:
      provider: "github_actions"
      workflows:
        - "test"
        - "lint"
        - "build"
        - "publish"

  # Package configuration
  packaging:
    # Distribution
    build_system: "setuptools"         # setuptools | poetry | flit

    # Package metadata
    metadata:
      author: "Dr. Cheng Che"
      author_email: "che@example.com"
      license: "MIT"
      classifiers:
        - "Development Status :: 4 - Beta"
        - "Intended Audience :: Science/Research"
        - "Programming Language :: Python :: 3.11"

    # Dependencies
    dependencies:
      # Core dependencies (always installed)
      core:
        - "click>=8.0"
        - "pydantic>=2.0"
        - "python-dotenv>=1.0"

      # Optional dependencies (extras)
      extras:
        dev:
          - "pytest>=7.0"
          - "black>=23.0"
          - "ruff>=0.1"
          - "mypy>=1.0"
        docs:
          - "sphinx>=5.0"
          - "sphinx-rtd-theme>=1.0"
        ml:
          - "numpy>=1.24"
          - "pandas>=2.0"
          - "scikit-learn>=1.3"

  # Testing configuration
  testing:
    framework: "pytest"

    # Test discovery
    discovery:
      patterns:
        - "test_*.py"
        - "*_test.py"
      directories:
        - "tests"

    # Coverage
    coverage:
      threshold: 80
      report_format: "html"

    # Test markers
    markers:
      - "unit: Unit tests"
      - "integration: Integration tests"
      - "slow: Slow running tests"
      - "gpu: Tests requiring GPU"

  # Documentation
  documentation:
    readme_path: "README.md"
    changelog_path: "CHANGELOG.md"
    contributing_path: "CONTRIBUTING.md"
    license_path: "LICENSE"
    principles_docs: "global_scripts/00_principles"

    # API documentation
    api_docs:
      tool: "sphinx"
      source_dir: "docs/source"
      build_dir: "docs/build"

  # Deployment
  deployment:
    # Package publication
    publish:
      repository: "pypi"               # pypi | test_pypi | private

    # Docker
    docker:
      enabled: false
      base_image: "python:3.11-slim"

  # Logging
  logging:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Security
  security:
    # Dependency scanning
    dependency_scanning: true
    scanner: "safety"                  # safety | bandit

    # Secret scanning
    secret_scanning: true

    # Security updates
    auto_update_dependencies: false

  # Data science specific (if applicable)
  data_science:
    # Notebook configuration
    notebooks:
      directory: "notebooks"
      kernel: "python3"

    # Data versioning
    data_versioning:
      tool: "dvc"                      # dvc | git-lfs
      storage: "local"                 # local | s3 | gcs

    # Experiment tracking
    experiment_tracking:
      tool: "mlflow"                   # mlflow | wandb | tensorboard

    # Model registry
    model_registry:
      enabled: false
      location: "models"

# Metadata
metadata:
  created_date: "2025-10-03"
  last_modified: "2025-10-03"
  config_version: "1.0"
  schema_version: "1.0"
  python_requires: ">=3.11"
