# ============================================================
# SECTION 6: SCENARIO MAPPINGS
# ============================================================
scenarios:

  building_etl:
    description: "Developing ETL (Extract-Transform-Load) pipelines"
    complexity: moderate
    must_read:
      - MP064  # ETL-Derivation separation
      - MP108  # ETL phase sequence
      - MP029  # No fake data
      - DM_R041  # Directory structure
    optional:
      - DM_R023  # If accessing databases
    checklist:
      - "Is the script in the ETL/{platform}/ directory?"
      - "Does the filename follow {platform}_ETL{datatype}_{phase}.R?"
      - "Is there NO business logic in the ETL script?"
      - "Are phases executed in order: 0IM → 1ST → 2TR?"
      - "Is no script in the root update_scripts/ directory?"

  building_derivation:
    description: "Creating Derivation scripts for business logic"
    complexity: moderate
    must_read:
      - MP064  # ETL-Derivation separation
      - MP029  # No fake data
      - DM_R023  # Database access pattern
      - DM_R041  # Directory structure
    checklist:
      - "Is the script in the DRV/{platform}/ directory?"
      - "Does it consume data from ETL output (transformed_data)?"
      - "Is business logic clearly separated from data movement?"
      - "Am I using tbl2() for database access?"

  database_work:
    description: "Any work involving database connections and queries"
    complexity: simple
    must_read:
      - MP029  # No fake data
      - DM_R023  # Use tbl2()
    checklist:
      - "Am I using tbl2() instead of dplyr::tbl()?"
      - "Is the data coming from a real source?"

  creating_ui_component:
    description: "Developing Shiny UI components"
    complexity: moderate
    must_read:
      - UI_P004  # Component N-tuple pattern
      - SO_R007  # One function one file
    checklist:
      - "Do I have all three files: UI, Server, Defaults?"
      - "Are the file names consistent?"
      - "Is each file focused on one function?"

  function_creation:
    description: "Creating new R functions"
    complexity: simple
    must_read:
      - SO_R007  # One function one file
    checklist:
      - "Is the file named fn_{function_name}.R?"
      - "Is there only one function in the file?"

  project_setup:
    description: "Setting up project structure and initialization"
    complexity: moderate
    must_read:
      - SO_P002  # Script separation
      - SO_R013  # Initialization imports only
      - DM_R041  # Directory structure
    checklist:
      - "Are update_scripts and global_scripts properly separated?"
      - "Does initialization only import and configure?"
      - "Are ETL/DRV/orchestration directories created?"

  debugging:
    description: "Troubleshooting and fixing issues"
    complexity: varies
    must_read:
      - DEV_P001  # Debug principles
      - MP029  # No fake data (for test data)
    optional:
      - DEV_R001  # If refactoring loops
    checklist:
      - "Have I added logging at key points?"
      - "Can I reproduce the issue?"
      - "Have I documented the root cause?"
      - "Will I update CHANGELOG with the fix?"

  r_optimization:
    description: "Optimizing R code performance"
    complexity: simple
    must_read:
      - DEV_R001  # Apply over loops
    checklist:
      - "Am I using apply family instead of for loops?"
      - "Am I avoiding growing vectors inside loops?"
      - "Have I considered vectorized operations?"

  understanding_principles:
    description: "Learning how the principles system works"
    complexity: simple
    must_read:
      - MP001  # Axiomatization system
    checklist:
      - "Do I understand MP vs P vs R hierarchy?"
      - "Do I know which chapter each type belongs to?"
      - "Can I find the .qmd file for a specific principle?"

# ============================================================
# SECTION 7: PRIORITY ORDER (Conflict Resolution)
# ============================================================
priority_order:
  - level: 1
    type: meta_principle
    prefix: "MP"
    description: "System architecture constraints. Highest priority. Cannot be overridden."
    examples: ["MP029", "MP064", "MP108"]

  - level: 2
    type: principle
    prefix: ["SO_P", "DM_P", "DEV_P", "UI_P", "TD_P"]
    description: "Implementation guidelines. High priority. Override rules when conflicting."
    examples: ["UI_P004", "DEV_P001"]

  - level: 3
    type: rule
    prefix: ["SO_R", "DM_R", "DEV_R", "UI_R", "TD_R"]
    description: "Specific implementation patterns. Normal priority."
    examples: ["DM_R023", "SO_R007"]

conflict_resolution: |
  When two principles conflict in a specific situation:

  1. Check priority levels: Higher level (lower number) wins.
     MP > P > R

  2. If same level, check dependencies:
     If A requires B, then B takes precedence in the conflicting aspect.

  3. If still ambiguous, apply the principle that:
     - Has more specific applicability to the current scenario
     - Was created/modified more recently

  4. Document the resolution decision in code comments.

# ============================================================
# SECTION 8: IMPLEMENTATION STATUS
# ============================================================
implementation_status:
  fully_implemented:
    - "MP029_discrepancy_principle"
    - "DM_R023_universal_dbi_approach"
    - "SO_R007_one_function_one_file"

  partially_implemented:
    - "MP064_etl_derivation_separation"
    - "MP108_etl_phase_sequence"
    - "UI_P004_component_ntuple_pattern"

  not_yet_implemented:
    - "MP117_backup_disaster_recovery"
    - "MP116_dependency_vulnerability_management"

# ============================================================
# SECTION 9: GLOSSARY (Canonical Definitions)
# ============================================================
glossary:
  meta_principle:
    definition: "A system architecture constraint that cannot be violated"
    test: "If violated, the entire system design fails or becomes inconsistent"
    identifier_pattern: "MP###"

  principle:
    definition: "An implementation guideline at the layer or domain level"
    test: "If violated, specific functionality becomes incorrect or unmaintainable"
    identifier_pattern: "{DOMAIN}_P###"

  rule:
    definition: "A specific implementation pattern that can be mechanically verified"
    test: "Can be checked by code review or automated linting"
    identifier_pattern: "{DOMAIN}_R###"

  etl:
    definition: "Extract-Transform-Load: Data preparation without business logic"
    phases: ["0IM", "1ST", "2TR"]
    constraint: "No business calculations allowed"

  derivation:
    definition: "Business logic layer that consumes ETL output"
    constraint: "Must consume from transformed_data layer"
    allowed: "Calculations, aggregations, business rules"

  tbl2:
    definition: "The MAMBA wrapper function for database table access"
    location: "global_scripts/02_db_utils/fn_tbl2.R"
    replaces: "dplyr::tbl()"

