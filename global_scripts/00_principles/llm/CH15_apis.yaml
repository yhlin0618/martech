# SCENARIOS
# ====================

scenarios:
  adding_new_platform:
    description: "Integrating a new e-commerce platform"
    must_read:
      - API00  # Architecture overview
      - API01  # Authentication
      - API02  # Rate limiting
      - API03  # Error handling
      - API_TPL  # Template
    checklist:
      - "Identified authentication method?"
      - "Documented rate limits?"
      - "Created adapter extending BaseAdapter?"
      - "Implemented all required methods?"
      - "Added to router and configs?"

  debugging_api_issues:
    description: "Troubleshooting API integration problems"
    must_read:
      - API03  # Error handling
      - API02  # Rate limiting
    checklist:
      - "Check error logs for category"
      - "Verify rate limits not exceeded"
      - "Test authentication separately"
      - "Check network connectivity"

  implementing_auth:
    description: "Setting up authentication for a platform"
    must_read:
      - API01  # Authentication patterns
      - "MP110"  # Security credentials
    checklist:
      - "Identified auth method (key, OAuth2)?"
      - "Credentials in environment variables?"
      - "Token refresh implemented?"
