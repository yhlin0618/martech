# Validation Rules
validation:
  required_fields:
    - principle_file
    - implementations
    - implementations[].path
    - implementations[].functions
    - implementations[].category
  
  naming_conventions:
    function_files: "^fn_[a-z_]+\\.R$"
    principle_files: "^[A-Z]{2,}[0-9]{2,}_[a-z_]+\\.qmd$"
    
  code_organization:
    utilities: "02_db_utils/"
    platform_apis: "26_platform_apis/"
    etl_scripts: "update_scripts/"
    modules: "10_modules/"
    
# Usage Notes
usage:
  - "This map is used to locate implementation code referenced in principles"
  - "All principle files should reference implementations via this map"
  - "Implementation files should have clear documentation headers"
  - "Functions should be properly exported for sourcing"
  - "Category tags help organize related functionality"