# ========================================
# CH02: Data Management Principles
# Version: 1.1
# Last Updated: 2026-01-26
#
# Contains: DM_P001-DM_P007 (7 principles) + DM_R001-DM_R058 (58 rules)
# Total: 65 principles
# ========================================

chapter: "CH02_data"
description: "Data Management Principles and Rules"
principle_count: 66

principles:

  # ====================
  # DM_P PRINCIPLES (6)
  # ====================

  - id: DM_P001
    type: principle
    name: data_integrity
    display_name: "Data Integrity"
    one_liner: "Ensure data accuracy, completeness, and consistency throughout lifecycle"
    file_path: "CH02_data_management/principles/DM_P001_data_integrity.qmd"

    rule_natural: |
      All data operations must preserve integrity:
      - Validate data on entry and exit
      - Use constraints and checks
      - Document data transformations
      - Maintain audit trails

    rule_formal: |
      RULE DM_P001_INTEGRITY:
      FOR ALL data_operation O on dataset D:
      preserves_accuracy(O, D)
      AND preserves_completeness(O, D)
      AND is_documented(O)

    violations:
      - "Modifying data without validation"
      - "Silent data truncation"
    compliant:
      - "Validation before database insert"
      - "Logging all data transformations"

  - id: DM_P002
    type: principle
    name: data_visualization
    display_name: "Data Visualization"
    one_liner: "Visualizations must accurately represent underlying data"
    file_path: "CH02_data_management/principles/DM_P002_data_visualization.qmd"

    rule_natural: |
      All visualizations must truthfully represent data:
      - Axes must start from meaningful values
      - Scale must not distort perception
      - Labels must be clear and accurate
      - Color choices must be accessible

    rule_formal: |
      RULE DM_P002_VISUALIZATION:
      FOR ALL visualization V of dataset D:
      accurately_represents(V, D)
      AND has_clear_labels(V)
      AND uses_appropriate_scale(V)

    violations:
      - "Truncated Y-axis to exaggerate trends"
      - "Missing axis labels"
    compliant:
      - "Full-range axis with clear tick marks"
      - "Legend with all categories"

  - id: DM_P003
    type: principle
    name: dual_id_format
    display_name: "Dual ID Format"
    one_liner: "Support both natural keys and surrogate keys for flexibility"
    file_path: "CH02_data_management/principles/DM_P003_dual_id_format.qmd"

    rule_natural: |
      Data entities should support dual identification:
      - Natural key: Human-readable identifier (e.g., product_code)
      - Surrogate key: System-generated integer ID
      - Both must be maintained consistently
      - Natural key for display, surrogate for joins

    rule_formal: |
      RULE DM_P003_DUAL_ID:
      FOR ALL entity E:
      has_natural_key(E) AND has_surrogate_key(E)
      AND bijection(natural_key(E), surrogate_key(E))

    violations:
      - "Using only auto-increment ID without natural key"
      - "Inconsistent ID mapping"
    compliant:
      - "product_code (natural) + product_id (surrogate)"
      - "customer_email (natural) + customer_id (surrogate)"

  - id: DM_P004
    type: principle
    name: dual_parameter_sources
    display_name: "Dual Parameter Sources"
    one_liner: "Support parameters from both config files and database"
    file_path: "CH02_data_management/principles/DM_P004_dual_parameter_sources.qmd"

    rule_natural: |
      Application parameters can come from two sources:
      - Config files (YAML): Static, version-controlled settings
      - Database tables: Dynamic, runtime-modifiable settings
      - Config takes precedence unless explicitly overridden
      - Document which parameters come from which source

    rule_formal: |
      RULE DM_P004_PARAM_SOURCES:
      FOR ALL parameter P:
      source(P) IN {"config", "database"}
      AND IF conflict(P) THEN use(config_value(P))

    violations:
      - "Hard-coded parameters in code"
      - "Undocumented parameter sources"
    compliant:
      - "app_config.yaml for static settings"
      - "settings table for user preferences"

  - id: DM_P005
    type: principle
    name: row_aligned_tables
    display_name: "Row-Aligned Tables"
    one_liner: "Related tables must maintain row alignment for consistency"
    file_path: "CH02_data_management/principles/DM_P005_row_aligned_tables.qmd"

    rule_natural: |
      When tables represent the same entities from different perspectives:
      - Row count must match
      - Row order must be consistent
      - IDs must align one-to-one
      - Used for feature matrices and derived tables

    rule_formal: |
      RULE DM_P005_ROW_ALIGNED:
      FOR ALL table_pair (T1, T2) where is_aligned(T1, T2):
      nrow(T1) EQUALS nrow(T2)
      AND row_order(T1) EQUALS row_order(T2)

    violations:
      - "Feature table with different row count than base table"
      - "Mismatched ID sequences"
    compliant:
      - "df_customer and df_customer_features with same row order"

  - id: DM_P006
    type: principle
    name: integer_id_consistency
    display_name: "Integer ID Consistency"
    one_liner: "All IDs must be stored and used as integers consistently"
    file_path: "CH02_data_management/principles/DM_P006_integer_id_consistency.qmd"

    rule_natural: |
      ID columns must maintain integer type throughout:
      - Store as INTEGER in database
      - Parse as integer in R (as.integer())
      - Avoid character coercion
      - Join operations use integer comparison

    rule_formal: |
      RULE DM_P006_INT_ID:
      FOR ALL id_column C:
      type(C) EQUALS INTEGER
      AND all_operations_preserve_type(C)

    violations:
      - "ID stored as VARCHAR"
      - "ID coerced to character for string concat"
    compliant:
      - "customer_id INTEGER PRIMARY KEY"
      - "as.integer(id) before joins"

  - id: DM_P007
    type: principle
    parent: MP150  # Transparency Principle
    name: information_flow_transparency
    display_name: "Information Flow Transparency"
    one_liner: "Make data flow visible and traceable"
    file_path: "CH02_data_management/principles/DM_P007_information_flow_transparency.qmd"
    migrated_from: MP053  # Reclassified from meta-principle to principle (2026-02-28)

    rule_natural: |
      Data flow is transparent:
      - Document data lineage
      - Trace transformations
      - Log data movements
      - Audit trail maintained

    rule_formal: |
      RULE DM_P007_TRANSPARENT:
      data_flow is documented
      AND traceable
      AND logged
      AND auditable

    violations:
      - "Hidden data transformations"
      - "No data lineage"
    compliant:
      - "Documented data pipeline"

  # ====================
  # DM_R RULES (47)
  # ====================

  - id: DM_R001
    type: rule
    name: data_frame_creation_strategy
    display_name: "Data Frame Creation Strategy"
    one_liner: "Use consistent patterns for creating data frames"
    file_path: "CH02_data_management/rules/DM_R001_data_frame_creation_strategy.qmd"

    rule_natural: |
      Data frames should be created using consistent patterns:
      - Use tibble() for new data frames
      - Use tbl2() for database queries
      - Avoid repeated rbind() in loops
      - Pre-allocate when size is known

    rule_formal: |
      RULE DM_R001_DF_CREATE:
      FOR ALL data_frame df:
      IF from_database THEN use_tbl2()
      ELSE use_tibble()
      AND NOT in_loop(rbind(df, row))

    violations:
      - "Using data.frame() instead of tibble()"
      - "Growing df with rbind in loop"
    compliant:
      - "tibble(col1 = vals1, col2 = vals2)"
      - "pre-allocate then assign rows"

  - id: DM_R002
    type: rule
    name: universal_data_access
    display_name: "Universal Data Access"
    one_liner: "Use standardized data access patterns across all code"
    file_path: "CH02_data_management/rules/DM_R002_universal_data_access.qmd"

    rule_natural: |
      All database access must use the universal pattern:
      - Use tbl2() function for all table access
      - Never use dplyr::tbl() directly
      - Consistent connection handling
      - Automatic schema detection

    rule_formal: |
      RULE DM_R002_ACCESS:
      FOR ALL table_access T:
      uses(T, "tbl2()")
      AND NOT uses(T, "dplyr::tbl()")

    violations:
      - "dplyr::tbl(con, 'table')"
      - "Direct SQL without tbl2"
    compliant:
      - "tbl2(con, 'df_customer')"

  - id: DM_R003
    type: rule
    name: database_access_tbl
    display_name: "Database Access via tbl"
    one_liner: "Use tbl() pattern for lazy database queries"
    file_path: "CH02_data_management/rules/DM_R003_database_access_tbl.qmd"

    rule_natural: |
      Database queries should use lazy evaluation:
      - Use tbl() for deferred execution
      - Chain dplyr verbs for query building
      - collect() only when data needed in memory
      - Minimize data transfer

    rule_formal: |
      RULE DM_R003_TBL:
      FOR ALL query Q:
      starts_with(Q, tbl())
      AND collect_called_last(Q)

    violations:
      - "SELECT * INTO memory first, filter later"
      - "Collecting before filtering"
    compliant:
      - "tbl() %>% filter() %>% collect()"

  - id: DM_R004
    type: rule
    name: data_storage_organization
    display_name: "Data Storage Organization"
    one_liner: "Organize data files in standardized directories"
    file_path: "CH02_data_management/rules/DM_R004_data_storage_organization.qmd"

    rule_natural: |
      Data files must be organized by purpose:
      - data/raw/ for original unmodified data
      - data/processed/ for cleaned data
      - data/app_data/ for application-specific data
      - data/temp/ for temporary files (auto-cleaned)

    rule_formal: |
      RULE DM_R004_STORAGE:
      FOR ALL data_file F:
      in_appropriate_directory(F, purpose(F))
      AND follows_naming_convention(F)

    violations:
      - "Data files in project root"
      - "Mixing raw and processed in same folder"
    compliant:
      - "data/raw/customers_2024.csv"
      - "data/processed/df_customer_cleaned.parquet"

  - id: DM_R005
    type: rule
    name: id_relationship_validation
    display_name: "ID Relationship Validation"
    one_liner: "Validate ID relationships before joins"
    file_path: "CH02_data_management/rules/DM_R005_id_relationship_validation.qmd"

    rule_natural: |
      Before joining tables, validate ID relationships:
      - Check for orphan records
      - Verify expected cardinality (1:1, 1:N, N:M)
      - Log unmatched records
      - Document relationship assumptions

    rule_formal: |
      RULE DM_R005_ID_VALIDATE:
      BEFORE join(T1, T2) on key K:
      validate_cardinality(T1.K, T2.K)
      AND check_orphans(T1.K, T2.K)

    violations:
      - "Joining without checking for missing keys"
      - "Silent loss of rows in inner join"
    compliant:
      - "anti_join() check before join"
      - "Logging unmatched records"

  - id: DM_R006
    type: rule
    name: cross_platform_data_structure
    display_name: "Cross-Platform Data Structure"
    one_liner: "Data structures must be consistent across platforms"
    file_path: "CH02_data_management/rules/DM_R006_cross_platform_data_structure.qmd"

    rule_natural: |
      When data exists on multiple platforms (cbz, eby, amz):
      - Same column names and types
      - Same table structures
      - Platform-agnostic processing logic
      - Only platform-specific code in ETL

    rule_formal: |
      RULE DM_R006_CROSS_PLATFORM:
      FOR ALL table T across platforms P1, P2:
      schema(T, P1) EQUALS schema(T, P2)

    violations:
      - "Different column names per platform"
      - "Platform-specific logic in derivation"
    compliant:
      - "Unified df_customer schema across platforms"

  - id: DM_R007
    type: rule
    name: multiple_selection_delimiter
    display_name: "Multiple Selection Delimiter"
    one_liner: "Use comma delimiter for multiple values in single field"
    file_path: "CH02_data_management/rules/DM_R007_multiple_selection_delimiter.qmd"

    rule_natural: |
      When storing multiple selections in one field:
      - Use comma (,) as delimiter
      - No spaces around delimiter
      - Use consistent ordering
      - Consider normalization for complex cases

    rule_formal: |
      RULE DM_R007_DELIMITER:
      FOR ALL multi_value_field F:
      delimiter(F) EQUALS ","
      AND no_spaces_around_delimiter(F)

    violations:
      - "Using pipe | or semicolon ; as delimiter"
      - "Inconsistent spacing: 'a, b,c'"
    compliant:
      - "'option1,option2,option3'"

  - id: DM_R008
    type: rule
    name: platform_id_reference
    display_name: "Platform ID Reference"
    one_liner: "Use platform_ids consistently for multi-platform data"
    file_path: "CH02_data_management/rules/DM_R008_platform_id_reference.qmd"

    rule_natural: |
      Platform identification must be consistent:
      - Use standard codes: cbz, eby, amz
      - Platform column named 'platform_id'
      - Always lowercase
      - Validate against allowed values

    rule_formal: |
      RULE DM_R008_PLATFORM_ID:
      FOR ALL platform_reference P:
      P IN {"cbz", "eby", "amz"}
      AND is_lowercase(P)

    violations:
      - "Using 'CBZ' or 'Cyberbiz'"
      - "Inconsistent platform naming"
    compliant:
      - "platform_id = 'cbz'"

  - id: DM_R009
    type: rule
    name: special_id_conventions
    display_name: "Special ID Conventions"
    one_liner: "Reserve specific ID values for special purposes"
    file_path: "CH02_data_management/rules/DM_R009_special_id_conventions.qmd"

    rule_natural: |
      Special IDs have reserved meanings:
      - 0: ALL category (aggregate)
      - -1: Unknown/Unspecified
      - NULL: Missing data
      - Document any domain-specific conventions

    rule_formal: |
      RULE DM_R009_SPECIAL_ID:
      id_value(0) MEANS "all_category"
      id_value(-1) MEANS "unknown"
      id_value(NULL) MEANS "missing"

    violations:
      - "Using 0 as valid product ID"
      - "Using -1 for valid data"
    compliant:
      - "product_id = 0 for ALL products aggregate"

  - id: DM_R010
    type: rule
    name: filtering_logic_patterns
    display_name: "Filtering Logic Patterns"
    one_liner: "Use consistent patterns for data filtering"
    file_path: "CH02_data_management/rules/DM_R010_filtering_logic_patterns.qmd"

    rule_natural: |
      Apply consistent filtering patterns:
      - Use dplyr::filter() for row selection
      - Use %in% for multiple value matching
      - Handle NA explicitly
      - Chain filters logically

    rule_formal: |
      RULE DM_R010_FILTER:
      FOR ALL filter operation F:
      uses_dplyr_filter(F)
      AND handles_na_explicitly(F)

    violations:
      - "Using subset() instead of filter()"
      - "Ignoring NA in filters"
    compliant:
      - "filter(col %in% values | is.na(col))"

  - id: DM_R011
    type: rule
    name: unified_tbl_data_access
    display_name: "Unified tbl Data Access"
    one_liner: "Use tbl() as the unified interface for database tables"
    file_path: "CH02_data_management/rules/DM_R011_unified_tbl_data_access.qmd"

    rule_natural: |
      All database table access through unified interface:
      - tbl() function wraps all database access
      - Consistent syntax regardless of database type
      - Automatic connection management
      - Schema-aware table resolution

    rule_formal: |
      RULE DM_R011_UNIFIED:
      FOR ALL table_access:
      interface = tbl()
      AND works_on_all_db_types()

    violations:
      - "Different access patterns per database"
      - "Direct SQL string queries"
    compliant:
      - "tbl(con, 'table_name') for all databases"

  - id: DM_R012
    type: rule
    name: tbl_pattern_rationale
    display_name: "tbl Pattern Rationale"
    one_liner: "Understanding why tbl pattern is preferred"
    file_path: "CH02_data_management/rules/DM_R012_tbl_pattern_rationale.qmd"

    rule_natural: |
      The tbl pattern provides benefits:
      - Lazy evaluation (query optimization)
      - Consistent dplyr interface
      - Database-agnostic code
      - Automatic SQL translation

    rule_formal: |
      RULE DM_R012_RATIONALE:
      tbl_pattern PROVIDES [
        lazy_evaluation,
        consistent_interface,
        database_agnostic,
        auto_sql_translation
      ]

    violations:
      - "Fetching entire table then filtering in R"
    compliant:
      - "tbl() %>% filter() %>% collect() pattern"

  - id: DM_R013
    type: rule
    name: dplyr_usage
    display_name: "dplyr Usage Standards"
    one_liner: "Follow dplyr best practices for data manipulation"
    file_path: "CH02_data_management/rules/DM_R013_dplyr_usage.qmd"

    rule_natural: |
      Use dplyr consistently:
      - Pipe operator %>% for chaining
      - mutate() for adding/modifying columns
      - select() for column selection
      - Avoid mixing base R and dplyr syntax

    rule_formal: |
      RULE DM_R013_DPLYR:
      FOR ALL data_manipulation M:
      uses_dplyr_verbs(M)
      AND uses_pipe_operator(M)
      AND NOT mixes_base_r(M)

    violations:
      - "df$newcol <- value instead of mutate()"
      - "Mixing $ notation with pipes"
    compliant:
      - "df %>% mutate(newcol = value)"

  - id: DM_R014
    type: rule
    name: tbl2_enhanced_data_access
    display_name: "tbl2 Enhanced Data Access"
    one_liner: "Use tbl2() for enhanced database table access"
    file_path: "CH02_data_management/rules/DM_R014_tbl2_enhanced_data_access.qmd"

    rule_natural: |
      tbl2() provides enhanced features over tbl():
      - Automatic df_ prefix handling
      - Schema detection
      - Connection validation
      - Consistent error messages

    rule_formal: |
      RULE DM_R014_TBL2:
      FOR ALL database_access D:
      uses(D, "tbl2()")
      AND benefits_from_enhanced_features(D)

    violations:
      - "Using raw tbl() instead of tbl2()"
    compliant:
      - "tbl2(con, 'customer')"

  - id: DM_R015
    type: rule
    name: dynamic_combined_id_pattern
    display_name: "Dynamic Combined ID Pattern"
    one_liner: "Create combined IDs dynamically for multi-key scenarios"
    file_path: "CH02_data_management/rules/DM_R015_dynamic_combined_id_pattern.qmd"

    rule_natural: |
      For composite keys, create combined IDs:
      - Format: key1_key2_key3
      - Use underscore separator
      - Create at data entry point
      - Maintain throughout pipeline

    rule_formal: |
      RULE DM_R015_COMBINED_ID:
      FOR composite_key (K1, K2, K3):
      combined_id = concat(K1, "_", K2, "_", K3)
      AND created_at_entry_point()

    violations:
      - "Different ID formats at different stages"
    compliant:
      - "paste(platform, customer_id, sep='_')"

  - id: DM_R016
    type: rule
    name: lowercase_natural_key
    display_name: "Lowercase Natural Key"
    one_liner: "Natural keys must be lowercase for consistency"
    file_path: "CH02_data_management/rules/DM_R016_lowercase_natural_key.qmd"

    rule_natural: |
      All natural keys should be lowercase:
      - Convert on input
      - Store in lowercase
      - Compare case-insensitively
      - Display can be formatted differently

    rule_formal: |
      RULE DM_R016_LOWERCASE:
      FOR ALL natural_key K:
      stored_value(K) = tolower(K)

    violations:
      - "Mixed case natural keys"
      - "Case-sensitive key comparisons"
    compliant:
      - "product_code = tolower(input_code)"

  - id: DM_R017
    type: rule
    name: memory_resident_parameters
    display_name: "Memory-Resident Parameters"
    one_liner: "Keep frequently accessed parameters in memory"
    file_path: "CH02_data_management/rules/DM_R017_memory_resident_parameters.qmd"

    rule_natural: |
      Frequently used parameters should be cached:
      - Load at initialization
      - Store in environment or reactive values
      - Refresh on demand
      - Document cache lifetime

    rule_formal: |
      RULE DM_R017_MEMORY:
      FOR ALL parameter P where is_frequent(P):
      load_at_init(P)
      AND cache_in_memory(P)

    violations:
      - "Re-reading config file for each access"
      - "Database query for every parameter lookup"
    compliant:
      - "params <- load_config() at startup"

  - id: DM_R018
    type: rule
    name: filter_variable_naming
    display_name: "Filter Variable Naming"
    one_liner: "Name filter variables with filter_ prefix"
    file_path: "CH02_data_management/rules/DM_R018_filter_variable_naming.qmd"

    rule_natural: |
      Variables used for filtering should be named:
      - filter_{what} for filter values
      - selected_{what} for UI selections
      - Avoid generic names like 'x' or 'val'

    rule_formal: |
      RULE DM_R018_FILTER_NAME:
      FOR ALL filter_variable V:
      name(V) MATCHES "filter_*" OR "selected_*"

    violations:
      - "x <- input$product"
      - "val <- c('a', 'b')"
    compliant:
      - "filter_product <- input$product"
      - "selected_categories <- input$category"

  - id: DM_R019
    type: rule
    name: id_extraction_guidelines
    display_name: "ID Extraction Guidelines"
    one_liner: "Extract IDs using consistent patterns"
    file_path: "CH02_data_management/rules/DM_R019_id_extraction_guidelines.qmd"

    rule_natural: |
      When extracting IDs from data:
      - Use pull() for single column extraction
      - Use unique() to remove duplicates
      - Convert to appropriate type
      - Handle NULL/NA explicitly

    rule_formal: |
      RULE DM_R019_EXTRACT:
      FOR ID extraction:
      pattern = data %>% pull(id_col) %>% unique()
      AND type_convert_if_needed()

    violations:
      - "data$id without unique()"
      - "Ignoring type conversion"
    compliant:
      - "data %>% pull(id) %>% unique() %>% as.integer()"

  - id: DM_R020
    type: rule
    name: unified_product_id
    display_name: "Unified Product ID"
    one_liner: "Use unified product ID format across platforms"
    file_path: "CH02_data_management/rules/DM_R020_unified_product_id.qmd"

    rule_natural: |
      Product IDs must be unified:
      - Format: platform_originalID
      - Stored in unified_product_id column
      - Original ID preserved in platform_product_id
      - Enables cross-platform analysis

    rule_formal: |
      RULE DM_R020_UNIFIED_PRODUCT:
      unified_product_id = concat(platform, "_", original_id)
      AND preserves_original_id()

    violations:
      - "Using platform-specific IDs directly"
      - "Losing original ID information"
    compliant:
      - "unified_product_id = 'cbz_12345'"

  - id: DM_R021
    type: rule
    name: integer_id_type_conversion
    display_name: "Integer ID Type Conversion"
    one_liner: "Convert IDs to integer type explicitly"
    file_path: "CH02_data_management/rules/DM_R021_integer_id_type_conversion.qmd"

    rule_natural: |
      IDs must be converted to integers:
      - Use as.integer() explicitly
      - Handle conversion failures gracefully
      - Log invalid values
      - Apply at data entry point

    rule_formal: |
      RULE DM_R021_INT_CONVERT:
      FOR ALL id_value V:
      IF should_be_integer(V)
      THEN V = as.integer(V)
      AND handle_na_result()

    violations:
      - "Leaving ID as character after read"
      - "Silent NA coercion"
    compliant:
      - "id <- as.integer(raw_id)"

  - id: DM_R022
    type: rule
    name: platform_numbering_convention
    display_name: "Platform Numbering Convention"
    one_liner: "Assign consistent numeric codes to platforms"
    file_path: "CH02_data_management/rules/DM_R022_platform_numbering_convention.qmd"

    rule_natural: |
      Platforms have assigned numeric codes:
      - cbz = 1
      - eby = 2
      - amz = 3
      - Use for ordered operations
      - Character code for display

    rule_formal: |
      RULE DM_R022_PLATFORM_NUM:
      platform_number("cbz") = 1
      platform_number("eby") = 2
      platform_number("amz") = 3

    violations:
      - "Using inconsistent platform numbers"
    compliant:
      - "platform_num <- case_when(platform == 'cbz' ~ 1, ...)"

  - id: DM_R023
    type: rule
    name: universal_dbi_approach
    display_name: "Universal DBI Approach"
    one_liner: "Use tbl2() (extended dplyr::tbl) for database reads"
    file_path: "CH02_data_management/rules/DM_R023_universal_dbi_approach.qmd"

    rule_natural: |
      ALL database read access must use tbl2():
      - tbl2() is the extended replacement for dplyr::tbl()
      - Never use dplyr::tbl() directly for reads
      - Do not use raw SQL for reads (dbGetQuery/dbSendQuery)
      - Use dbWriteTable()/dbExecute() only for data modification
      - tbl2() handles df_ prefix and attached database syntax
      - Defined in global_scripts/02_db_utils/tbl2/

    rule_formal: |
      RULE DM_R023_UNIVERSAL_DBI:
      FOR ALL database_read_access:
      use_tbl2()
      AND NOT use_dplyr_tbl()
      AND NOT use_raw_sql()

    violations:
      - "dplyr::tbl(con, 'table')"
      - "dbGetQuery(con, 'SELECT *')"
      - "dbSendQuery(con, 'SELECT *')"
    compliant:
      - "tbl2(con, 'customer')"

  - id: DM_R024
    type: rule
    name: list_column_handling
    display_name: "List Column Handling"
    one_liner: "Handle list columns properly in data frames"
    file_path: "CH02_data_management/rules/DM_R024_list_column_handling.qmd"

    rule_natural: |
      List columns require special handling:
      - Use unnest() to expand
      - Use nest() to create
      - Handle NULL elements
      - Consider JSON serialization for storage

    rule_formal: |
      RULE DM_R024_LIST_COL:
      FOR ALL list_column L:
      IF expanding THEN unnest(L)
      IF storing THEN serialize_to_json(L)

    violations:
      - "Direct storage of list columns in database"
      - "Ignoring NULL elements"
    compliant:
      - "mutate(col = map_chr(list_col, toJSON))"

  - id: DM_R025
    type: rule
    name: type_conversion_r_duckdb
    display_name: "Type Conversion R-DuckDB"
    one_liner: "Handle type conversions between R and DuckDB correctly"
    file_path: "CH02_data_management/rules/DM_R025_type_conversion_r_duckdb.qmd"

    rule_natural: |
      R and DuckDB type mappings:
      - INTEGER <-> integer
      - DOUBLE <-> numeric
      - VARCHAR <-> character
      - BOOLEAN <-> logical
      - DATE <-> Date
      - Explicit conversion when needed

    rule_formal: |
      RULE DM_R025_TYPE_MAP:
      type_mapping = {
        R_integer -> DuckDB_INTEGER,
        R_numeric -> DuckDB_DOUBLE,
        R_character -> DuckDB_VARCHAR,
        R_logical -> DuckDB_BOOLEAN,
        R_Date -> DuckDB_DATE
      }

    violations:
      - "Implicit type coercion"
      - "Storing Date as string"
    compliant:
      - "as.Date(date_col) before storage"

  - id: DM_R026
    type: rule
