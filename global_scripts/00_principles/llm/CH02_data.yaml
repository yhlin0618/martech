  - id: DM_R052
    type: rule
    name: cross_platform_product_identification
    display_name: "Cross-Platform Product Identification"
    one_liner: "Use surrogate key pattern for M:N product-to-platform mappings"
    file_path: "CH02_data_management/rules/DM_R052_cross_platform_product_identification.qmd"

    rule_natural: |
      Cross-platform product identification uses surrogate keys:
      - product_mapping_id: Auto-incremented surrogate key
      - sku: Company internal SKU (natural key part 1)
      - eby_item_id: eBay item number (natural key part 2)
      - Supports M:N relationships (one SKU → multiple eBay IDs)
      - Source priority for deduplication when merging
      - Maintains product line and category metadata

    rule_formal: |
      RULE DM_R052_CROSS_PLATFORM_ID:
      FOR product_mapping table:
        primary_key = product_mapping_id (surrogate, INTEGER)
        natural_key = (sku, eby_item_id) (composite)
        relationship = M:N (sku ↔ eby_item_id)

      schema = {
        product_mapping_id: INTEGER PRIMARY KEY,
        sku: VARCHAR NOT NULL,
        eby_item_id: VARCHAR,
        product_name: VARCHAR,
        product_category: VARCHAR,
        product_line: VARCHAR,
        source: VARCHAR NOT NULL,
        created_at: TIMESTAMP
      }

    violations:
      - "Using only SKU as unique key (ignores M:N)"
      - "Hardcoding platform-specific logic in derivations"
      - "No source tracking for data origin"
    compliant:
      - "Surrogate key + composite natural key"
      - "Source column for priority-based deduplication"
      - "Platform-agnostic derivation queries"

  - id: DM_R053
    type: rule
    name: multi_source_etl_priority_pattern
    display_name: "Multi-Source ETL Priority Pattern"
    one_liner: "Use source naming and priority ordering for multi-source data integration"
    file_path: "CH02_data_management/rules/DM_R053_multi_source_etl_priority_pattern.qmd"

    rule_natural: |
      When integrating data from multiple sources:

      1. Source Naming Convention:
         - Prefix indicates source type: excel_, google_sheet_, api_, manual_
         - Suffix adds specificity: google_sheet_sku_eby, google_sheet_inventory
         - Company-specific sources use company code: cbz_erp, eby_api

      2. Priority Ordering:
         - Alphabetically later sources override earlier ones
         - Example: google_sheet_sku_eby > google_sheet > excel
         - Implement via: arrange(desc(source)) %>% group_by(key) %>% slice_head(n=1)

      3. Dynamic Column Mapping:
         - Use janitor::clean_names() for standardization
         - Pattern-based column discovery with regex
         - Never hardcode column names from external sources

      4. Company-Specific Configuration:
         - Source definitions in app_config.yaml
         - Priority order configurable per company
         - Column mappings defined in config, not code

    rule_formal: |
      RULE DM_R053_MULTI_SOURCE_PRIORITY:

      source_naming:
        pattern = "{type}_{specificity}"
        type IN {excel, google_sheet, api, manual, erp}

      priority_resolution:
        FOR duplicate_key K across sources S1, S2:
        IF alphabetical_order(S2) > alphabetical_order(S1)
        THEN use_value_from(S2)

      column_mapping:
        standardize = janitor::clean_names(df)
        find_column = grep(pattern, names(df))
        NOT hardcode_names()

      configuration:
        sources IN app_config.yaml
        priority_order IN app_config.yaml
        column_patterns IN app_config.yaml

    violations:
      - "Hardcoded column names like 'eBay Item Number'"
      - "Fixed priority order in code instead of config"
      - "No source column to track data origin"
      - "Using last-write-wins without explicit priority"
    compliant:
      - "Dynamic column discovery with regex patterns"
      - "Source priority via arrange(desc(source))"
      - "Configuration-driven source definitions"
      - "Company-specific priority in app_config.yaml"

  - id: DM_R054
    type: rule
    name: metadata_table_storage_pattern
    display_name: "Metadata Table Storage Pattern"
    one_liner: "Metadata and lookup tables stored directly in app_data, not 6-layer ETL"
    file_path: "CH02_data_management/rules/DM_R054_metadata_table_storage_pattern.qmd"

    rule_natural: |
      Two types of data have different storage patterns:

      1. Transaction Data (orders, sales, events):
         - Flows through 6-Layer ETL: raw → staged → transformed
         - Platform-specific processing
         - Incremental updates

      2. Metadata (lookups, mappings, configs):
         - Writes directly to app_data.duckdb
         - Single-phase ETL
         - Static reference data

      Metadata tables include:
      - df_product_mapping (cross-platform ID mapping)
      - df_product_line (product line definitions)
      - df_category_hierarchy (category tree)
      - df_customer_labels (segment labels)
      - df_variable_metadata (UI display names)
      - df_platform (platform_ids)
      - df_config_* (application configs)

    rule_formal: |
      RULE DM_R054_METADATA_STORAGE:

      data_classification:
        transaction_data = {orders, sales, events, logs}
        metadata = {mappings, lookups, configs, labels}

      storage_pattern:
        IF data_type IN transaction_data
        THEN flow_through_6_layer_etl()

        IF data_type IN metadata
        THEN write_directly_to_app_data()

      etl_naming:
        transaction: "{platform}_ETL_{type}_{phase}.R"
        metadata: "all_ETL_{type}_0IM.R"

      target_database:
        transaction_0IM: raw_data.duckdb
        metadata: app_data.duckdb

    violations:
      - "Metadata going through 6-layer (unnecessary staging)"
      - "Transaction data written directly to app_data (missing transformation)"
      - "Lookup tables in raw_data.duckdb"
    compliant:
      - "df_product_mapping → app_data.duckdb (direct)"
      - "df_cbz_orders → raw_data.duckdb (0IM phase)"
      - "Single ETL script for metadata tables"

  - id: DM_R040
    type: rule
