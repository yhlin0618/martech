  - id: DM_R044
    type: rule
    name: derivation_implementation_standard
    display_name: "Derivation Implementation Standard"
    one_liner: "Follow FIVE-PART structure with autoinit/autodeinit"
    file_path: "CH02_data_management/rules/DM_R044_derivation_implementation_standard.qmd"

    rule_natural: |
      Derivation scripts MUST follow FIVE-PART structure:

      HEADER (required):
        #####
        # DERIVATION: {Name}
        # VERSION: {X.Y}
        # PLATFORM: {cbz|amz|eby|all}
        # GROUP: D{nn}
        # SEQUENCE: {seq}
        # PURPOSE: {description}
        # CONSUMES: {input tables}
        # PRODUCES: {output tables}
        # PRINCIPLE: DM_R044, MP064, {others}
        #####
        #{platform}_D{group}_{sequence}

      PART 1: INITIALIZE
        - source("scripts/global_scripts/22_initializations/sc_Rprofile.R")
        - autoinit()  # MANDATORY - environment setup
        - library() statements
        - Initialize tracking: error_occurred, test_passed, rows_processed, start_time

      PART 2: MAIN
        - Wrap in tryCatch({ ... }, error = function(e) { error_occurred <<- TRUE })
        - Validate inputs
        - Load data via tbl2()
        - Apply business logic
        - Write outputs

      PART 3: TEST
        - Wrap in tryCatch()
        - Verify output exists
        - Validate structure
        - Check business rules
        - Set test_passed <- TRUE on success

      PART 4: SUMMARIZE
        - Calculate execution_time
        - Create summary_report list
        - Print formatted summary

      PART 5: DEINITIALIZE
        - Close database connections (only those created by script)
        - autodeinit()  # MANDATORY - must be LAST statement

    rule_formal: |
      RULE DM_R044_DRV_FIVE_PART:
      derivation_structure = [
        HEADER(derivation, version, platform, group, sequence, purpose, consumes, produces, principle),
        PART_1_INITIALIZE(autoinit, libraries, tracking_vars),
        PART_2_MAIN(tryCatch_wrapper, validate, load, logic, write),
        PART_3_TEST(tryCatch_wrapper, verify, validate, check),
        PART_4_SUMMARIZE(execution_time, summary_report, print),
        PART_5_DEINITIALIZE(close_connections, autodeinit)
      ]

      INVARIANT: autoinit() in PART 1, autodeinit() as LAST statement in PART 5
      INVARIANT: PART 2 and PART 3 wrapped in tryCatch()

    violations:
      - "Missing autoinit() or autodeinit()"
      - "No five-part structure"
      - "MAIN or TEST without tryCatch wrapper"
      - "Missing standard header fields"
      - "autodeinit() not at end of script"
    compliant:
      - "Five-part structure with autoinit/autodeinit"
      - "All sections wrapped appropriately"
      - "Standard header with all fields"

