      - "Standalone script with all deps sourced"

  - id: DM_R057
    type: rule
    name: unit_suffix_column_naming
    display_name: "Unit Suffix Column Naming"
    one_liner: "Include unit suffix in column names when values contain specific units"
    file_path: "CH02_data_management/rules/DM_R057_unit_suffix_column_naming.qmd"

    rule_natural: |
      When a column contains values with specific units, include unit suffix:
      - Time: _secs, _minutes, _hours, _days, _weeks, _months, _years
      - Size: _bytes, _kb, _mb, _gb
      - Ratio: _pct, _ratio, _bps
      - Currency: _usd, _twd, _jpy
      - MANDATORY for difftime conversions
      - Prevents unit confusion and ambiguity

    rule_formal: |
      RULE DM_R057_UNIT_SUFFIX:
      FOR ALL column C with unit U:
      column_name(C) = base_name + "_" + unit_suffix(U)

      unit_suffix_mapping = {
        seconds -> "secs",
        minutes -> "minutes",
        hours -> "hours",
        days -> "days",
        bytes -> "bytes",
        percentage -> "pct"
      }

      MANDATORY: difftime_conversion REQUIRES unit_suffix

    violations:
      - "as.numeric(difftime(...)) without unit suffix"
      - "processing_time without _secs or _minutes"
      - "file_size without _bytes or _mb"
    compliant:
      - "execution_time_secs = as.numeric(difftime(..., units='secs'))"
      - "customer_tenure_days"
      - "file_size_bytes"

  - id: DM_R058
    type: rule
    name: product_line_id_semantics
    display_name: "Product Line ID Semantics"
    one_liner: "Define product_line_id field semantics and 'all' handling"
    file_path: "CH02_data_management/rules/DM_R058_product_line_id_semantics.qmd"

    rule_natural: |
      product_line_id is a categorical identifier with three naming layers (v2):
      - UI Layer: product_line_id_chosen (user-selected value in sidebar, cfg$filters$product_line_id_chosen)
      - Slice Layer: product_line_id_sliced (DRV pre-computed data slice, cfg$filters$product_line_id_sliced)
      - DB Layer: product_line_id_filter (DuckDB WHERE column)
      - ETL Source: product_line_id (original column, unchanged)
      Data flow: chosen → sometimes equals sliced, sometimes equals filter
      Special value 'all' represents aggregate across all lines
      Works with platform_id in hierarchical relationship
      Position components read cfg$filters$product_line_id_chosen
      Micro/Poisson components prefer product_line_id_sliced, fallback to product_line_id_chosen

    rule_formal: |
      RULE DM_R058_PRODUCT_LINE:
      product_line_id is categorical identifier

      naming_layers = {
        ui_layer -> filters.product_line_id_chosen,
        slice_layer -> filters.product_line_id_sliced,
        db_layer -> product_line_id_filter,
        etl_source -> product_line_id
      }

      data_flow:
        product_line_id_chosen -> product_line_id_sliced | product_line_id_filter

      value_domain = {
        "all" -> meta_value (aggregate),
        "PL001", "PL002", ... -> specific lines
      }

      hierarchy:
        platform_id > product_line_id

      drv_handling:
        IF script.header.ALL_SUPPORT THEN allow "all"
        IF script.header.FORBIDS_ALL THEN reject "all"

    violations:
      - "Using 'all' without ALL_SUPPORT declaration"
      - "Missing product_line_id in standardized output"
      - "No validation for invalid product_line_id values"
      - "Shiny component reading bare cfg$filters$product_line_id (must use _chosen or _sliced)"
      - "Using cfg$product_line_id instead of cfg$filters$product_line_id_chosen"
    compliant:
      - "Header declares ALL_SUPPORT: product_line_id"
      - "Validates product_line_id parameter"
      - "Supports both 'all' and specific values"
      - "Position components read cfg$filters$product_line_id_chosen"
      - "Micro/Poisson components prefer product_line_id_sliced, fallback to product_line_id_chosen"

  - id: DM_R059
    type: rule
    name: drv_output_schema_contract
    display_name: "DRV Output Schema Contract"
    one_liner: "DRV output tables must have identical schema across all backends"
    file_path: "CH02_data_management/rules/DM_R059_drv_output_schema_contract.qmd"

    rule_natural: |
      DRV output schema must be a cross-backend contract:
      - Each DRV output table has ONE canonical column name set
      - Canonical names are the single source of truth
      - No aliases or compatibility shims in final DRV output
      - All downstream consumers (UI components, APIs) use canonical names only
      - ensure_dna_fields() style alias functions are migration aids, not permanent solutions

      Canonical naming conventions for DRV columns:
      - Raw metrics: short lowercase (cai, clv, cri, be2, pcv, ni)
      - ECDF-derived scores: dna_{dimension}_score (dna_r_score, dna_f_score, dna_m_score)
      - Raw dimension values: {dimension}_value (r_value, f_value, m_value)
      - Status/category: {concept}_status or {concept}_segment (nes_status, dna_segment)
      - Filter dimensions: {dimension}_filter (product_line_id_filter)
      - Counts: {noun} or {noun}_count (times, ni)
      - Temporal: {metric}_mean or {metric}_median (ipt_mean)

      Optional columns (may not exist in all backends):
      - Components must check column existence before use
      - Use dbListFields() or tryCatch() pattern
      - Provide graceful fallback when column absent

    rule_formal: |
      RULE DM_R059_SCHEMA_CONTRACT:
      FOR EACH drv_output_table T:
        T.schema MUST BE identical across {DuckDB, Supabase, any_future_backend}
        T.columns = canonical_names ONLY (no aliases)

      NAMING_CONVENTION:
        raw_metric -> lowercase_short: cai, clv, cri, be2, pcv
        ecdf_score -> dna_{dim}_score: dna_r_score, dna_f_score, dna_m_score
        raw_value -> {dim}_value: r_value, f_value, m_value
        status -> {concept}_status: nes_status
        filter -> {dim}_filter: product_line_id_filter

      OPTIONAL_COLUMN_HANDLING:
        IF column MAY NOT exist in backend:
          consumer MUST check existence BEFORE use
          consumer MUST provide graceful fallback

      ALIAS_DEPRECATION:
        ensure_dna_fields() alias pattern -> DEPRECATED
        New code MUST NOT create column aliases
        Existing aliases -> migrate to canonical names

    violations:
      - "Creating alias columns (e.g., both cai and cai_value)"
      - "Component SQL using non-canonical names"
      - "Assuming optional column exists without check"
      - "Different column names in DuckDB vs Supabase for same data"
    compliant:
      - "DRV writes canonical names only (cai, not cai_value)"
      - "Component uses canonical name in SQL SELECT"
      - "Optional columns checked with dbListFields() before use"
      - "Schema identical across all configured backends"

