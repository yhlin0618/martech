# ====================
# SCENARIOS
# ====================

scenarios:
  building_new_etl:
    description: "Creating a new ETL pipeline from scratch"
    must_read:
      - ETL_ARCH
      - ETL_IND
      - ETL_NAME
      - ETL_DECISION
    checklist:
      - "Does ETL have autoinit() and autodeinit()?"
      - "Can ETL run independently without other ETLs?"
      - "Are JOINs only in 2TR phase?"
      - "Does naming follow df_{platform}_{type}___stage pattern?"

  debugging_etl_issues:
    description: "Troubleshooting ETL pipeline problems"
    must_read:
      - ETL_ARCH
      - ETL_IND
      - ETL_STRUCT_JOIN
    checklist:
      - "Is phase isolation maintained?"
      - "Are there hidden dependencies on other ETLs?"
      - "Is structural JOIN in correct phase?"

  platform_specific_etl:
    description: "Creating platform-specific ETL variant"
    must_read:
      - ETL_NAME
      - ETL_EXTENSIBLE
      - ETL_MAMBA_IMPL
    checklist:
      - "Using ___COMPANY suffix for company-specific tables?"
      - "Generic pattern exists before creating specific?"
