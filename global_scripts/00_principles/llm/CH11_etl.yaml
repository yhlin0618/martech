  # ====================

  - id: ETL_PROD_COMPLETE
    type: implementation_pattern
    name: products_complete_pattern
    display_name: "Products Complete Pipeline Pattern"
    one_liner: "Full pipeline for product data from import to application layer"
    file_path: "part2_implementations/CH12_etl_pipelines/04_products_pipeline/generic/products_complete_pattern.qmd"

    rule_natural: |
      Products ETL complete pipeline:
      - 0IM: Import product catalog and attributes
      - 1ST: Standardize product codes and categories
      - 2TR: Join with product line dictionary
      - Further phases: Cleanse duplicates, process hierarchies

  # ====================
  # SPECIAL PATTERNS
  # ====================

  - id: ETL_EXTENSIBLE
    type: implementation_pattern
    name: extensible_etl_pattern
    display_name: "Extensible ETL Pattern"
    one_liner: "Design ETLs for future extension and modification"
    file_path: "part2_implementations/CH12_etl_pipelines/05_special_patterns/extensible_pattern.qmd"

    rule_natural: |
      Extensible ETL design:
      - Use configuration-driven processing
      - Separate generic patterns from platform-specific
      - Use triple underscore for company variants
      - Support adding new data types without restructuring

    rule_formal: |
      RULE EXTENSIBLE_ETL:
      config_driven processing
      generic_pattern + platform_specific_override
      company_variant uses "___COMPANY" suffix
      new_data_type NOT require restructure

