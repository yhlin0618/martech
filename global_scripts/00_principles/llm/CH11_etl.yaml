  # ====================
  # DATABASE DESIGN
  # ====================

  - id: ETL_DB_DESIGN
    type: implementation_guide
    name: ebay_database_design
    display_name: "MAMBA eBay Database Design"
    one_liner: "Database schema design for eBay platform ETL"
    file_path: "part2_implementations/CH12_etl_pipelines/MAMBA_eBay_Database_Design.qmd"

    rule_natural: |
      eBay database design follows:
      - Separate tables for orders (BAYORD) and details (BAYORE)
      - Normalized structure in raw and staged layers
      - Denormalized sales table in transformed layer
      - Clear foreign key relationships

  # ====================
  # DECISION TREE
  # ====================

  - id: ETL_DECISION
    type: decision_guide
    name: etl_decision_tree
    display_name: "ETL Design Decision Tree"
    one_liner: "Decision tree for ETL pipeline design choices"
    file_path: "part2_implementations/CH12_etl_pipelines/00_overview/decision_tree.qmd"

    rule_natural: |
      ETL Design Decision Tree:
      1. Source has multiple tables? → Create separate pipelines
      2. Data mixed in one table? → Split in 0IM phase
      3. Need denormalized output? → JOIN in 2TR phase
      4. Company-specific logic? → Add ___COMPANY suffix

    rule_formal: |
      RULE ETL_DECISION:
      IF source has multiple_tables THEN create separate_pipelines
      IF data_mixed_in_one_table THEN split_in_0IM
      IF need_denormalized_output THEN join_in_2TR
      IF company_specific_logic THEN add "___COMPANY" suffix

