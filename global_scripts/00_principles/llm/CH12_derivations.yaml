# ============================================================
# KEY DERIVATION PATTERNS (NSQL)
# ============================================================
patterns:
  consume_etl:
    nsql: |
      CONSUME transformed_data.df_{platform}_sales___standardized FROM ETL01
      VALIDATE required_columns: [customer_id, platform_id, product_line_id, payment_time, lineproduct_price]
    description: "Read ETL-prepared data with validation"

  customer_aggregation:
    nsql: |
      AGGREGATE transformed_data BY customer_id, platform_id, product_line_id_filter
      CALCULATE: total_spent, transaction_count, first_purchase, last_purchase
      OUTPUT TO processed_data.df_customer_aggregated
    description: "Group transactions by customer dimensions"

  rfm_calculation:
    nsql: |
      CALCULATE RFM FROM processed_data.df_customer_aggregated
      r_value: DATEDIFF(days, last_purchase, reference_date)
      f_value: transaction_count
      m_value: total_spent / transaction_count
    description: "Calculate classic RFM metrics"

  dna_scoring:
    nsql: |
      CALCULATE dna_scores:
        dna_m_score: PERCENT_RANK() OVER (ORDER BY m_value ASC)
        dna_f_score: PERCENT_RANK() OVER (ORDER BY f_value ASC)
        dna_r_score: 1 - PERCENT_RANK() OVER (ORDER BY r_value ASC)
        cai: (dna_m_score + dna_f_score + dna_r_score) / 3
    description: "Normalize RFM to 0-1 scores"

  nes_classification:
    nsql: |
      CLASSIFY nes_status:
        WHEN transaction_count = 1 AND tenure <= 30 THEN 'N'
        WHEN r_value <= 60 THEN 'E0'
        WHEN r_value <= 180 THEN 'S1'
        WHEN r_value <= 365 THEN 'S2'
        ELSE 'S3'
    description: "Classify customer lifecycle stage"

