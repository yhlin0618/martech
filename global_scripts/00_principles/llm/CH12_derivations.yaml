# ========================================
# CH10: Business Derivation Workflows
# MAMBA Principles - Derivations
# ========================================
#
# This chapter contains business logic derivations
# that consume ETL-prepared data and produce
# application-ready outputs.
#
# Derivations: D00-D04
#
# Key Principle: MP064 ETL-Derivation Separation
#   - ETL handles data preparation
#   - Derivations handle business logic
#
# ========================================

chapter_id: "CH10"
chapter_title: "Business Derivation Workflows"
description: "Derivations implement business logic on ETL-prepared data"
base_path: "docs/en/part2_implementations/CH13_derivations"

# ============================================================
# DRV GROUP SEMANTICS (重要！建立 DRV 腳本前必須確認)
# ============================================================
#
# 每個 DRV 群組有明確的功能定義，新建 DRV 腳本前必須確認正確群組。
#
drv_group_semantics:
  overview: |
    D00 - D04 群組各有專屬用途，選擇錯誤群組會導致架構混亂。
    特別注意：DNA 相關屬於 D01，Poisson 相關屬於 D04。

  groups:
    D00:
      name: "App Data Init"
      purpose: "基礎資料結構初始化、跨平台 lookup tables"
      examples: ["D00_01 初始化 app_data 結構"]

    D01:
      name: "Customer DNA Analysis"
      purpose: "客戶 DNA 分析（RFM、NES、DNA 分數、ECDF 分布）"
      examples:
        - "D01_05 df_dna_by_customer 彙總"
        - "D01_07 DNA 分布圖表預計算資料"
      keywords: ["DNA", "RFM", "NES", "CAI", "CRI", "ECDF", "customer_dna"]

    D02:
      name: "Filtered Customer Views"
      purpose: "分段客戶視圖、產品線篩選後的客戶資料"
      examples: ["D02_01 客戶分群視圖"]

    D03:
      name: "Positioning Analysis"
      purpose: "市場定位分析、競爭分析、策略建議"
      examples: ["D03_06 Segment analysis", "D03_08 AI insights"]

    D04:
      name: "Poisson Precision Marketing"
      purpose: "Poisson 分析、時序分析、精準行銷預測"
      examples:
        - "D04_02 Poisson analysis core"
        - "D04_04 Time series expansion"
      keywords: ["Poisson", "time_series", "precision", "prediction"]

  common_mistakes:
    - mistake: "DNA 相關放到 D04"
      correct: "DNA 相關放到 **D01** (Customer DNA Analysis)"
      reason: "D01 專門處理客戶 DNA 分析，包括 RFM、NES、DNA 分數"

    - mistake: "Poisson 分析放到 D01"
      correct: "Poisson 分析放到 **D04** (Poisson Precision Marketing)"
      reason: "D04 專門處理 Poisson 分析和時序預測"

    - mistake: "預計算資料放到 D04"
      correct: "看資料類型決定群組"
      reason: "DNA 預計算放 D01，Poisson 預計算放 D04"

  decision_tree: |
    建立新 DRV 腳本時的決策流程：

    1. 是否涉及 DNA、RFM、NES、CAI、客戶分數？
       → YES: D01 (Customer DNA Analysis)

    2. 是否涉及 Poisson、時序、精準行銷預測？
       → YES: D04 (Poisson Precision Marketing)

    3. 是否涉及產品線篩選的客戶視圖？
       → YES: D02 (Filtered Customer Views)

    4. 是否涉及市場定位、競爭分析？
       → YES: D03 (Positioning Analysis)

    5. 是否是基礎資料結構初始化？
       → YES: D00 (App Data Init)

