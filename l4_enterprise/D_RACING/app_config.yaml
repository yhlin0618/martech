# ==============================================================================
# D_RACING Configuration
# l4_enterprise | Created: 2026-02-28
# ==============================================================================

app:
  name: "D-Racing 技詮科技"
  version: "1.0.0"
  tier: "l4_enterprise"
  description: "AI-powered analytics platform for D-Racing 技詮科技"

theme:
  version: 5
  bootswatch: cosmo
layout: navbar

brand_name: "D_RACING"
language: "zh_TW.UTF-8"
RAW_DATA_DIR: "./data/local_data/rawdata_D_RACING"
parameters_folder: "default"

# ==============================================================================
# Database Connection (MP142: Configuration-Driven Pipeline)
# Mode options:
#   - "duckdb":   Force use local DuckDB file (for local development)
#   - "supabase": Force use Supabase PostgreSQL (for deployment)
#   - "auto":     Auto-detect (DuckDB if valid local file exists, else Supabase)
# ==============================================================================
database:
  mode: "duckdb"
  duckdb:
    path: "data/app_data/app_data.duckdb"
    read_only: true

# ==============================================================================
# Platforms (MP065) - 啟用的平台設為 status: "active"
# ==============================================================================
platforms:
  amz:
    status: "active"
    etl_sources:
      sales:
        source_type: "excel"
        version: "v1"
        rawdata_pattern: "amazon_sales/*/*.xlsx"
      keys:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "SKUtoASIN"
      product_profiles:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        # Tab naming: each product line has its own tab (e.g., Classic Gauge Set)
      competitor_ids:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "產品對照表"
      comment_properties:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        # 0IM resolves each product_line to available "_水準表" tabs
      reviews:
        source_type: "excel"
        version: "v1"
        rawdata_pattern: "amazon_reviews/**/*"
      competitor_sales:
        source_type: "excel"
        version: "v1"
        rawdata_pattern: "competitor_sales/**/*"
      keepa:
        source_type: "excel"
        version: "v1"
        rawdata_pattern: "Product sales rank*/*/*.xlsx"
        # NOTE: D_RACING 目前無 keepa 資料，此 ETL 會跳過
      demographic:
        source_type: "csv"
        version: "v1"
        rawdata_pattern: "amazon_demographic/*.csv"
      sku_mapping:
        source_type: "excel"
        version: "v1"
        rawdata_path: "SKUtoeBay numbers/SKUtoASIN number.xlsx"
      product_categories:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "產品類別彙整表"
      holidays:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "Holiday"
      promotion_codebook:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "Promotion Codebook"
      promotions:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "Promotion"
      term_mapping:
        source_type: "gsheets"
        version: "v1"
        sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
        sheet_name: "中英文對照表"

# ==============================================================================
# Google Sheets (選用)
# 取得 Sheet ID: https://docs.google.com/spreadsheets/d/【SHEET_ID】/edit
# ==============================================================================
googlesheet:
  # Legacy reference — sheet_id now managed in etl_sources per data type (DM_R037 v3.0)
  coding: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"

# ==============================================================================
# Metadata Sources
# 啟用後填入對應的 sheet_id 和 sheet_name
# ==============================================================================
metadata_sources:
  amz:
    enabled: false
    sheet_id: "1lKPrcl9Tth53v_x1-q458k-FC3ZQMMcJTQVMw9luJTg"
    sheet_name: "metadata_AMZ"

# ==============================================================================
# Components (通常不需修改)
# ==============================================================================
components:
  micro:
    microCustomer:
      primary: customer_details
      history: customer_history
    sales: sales_by_customer_dta
  macro:
    trends:
      data_source: sales_trends
      parameters:
        show_kpi: true
        refresh_interval: 300

# ==============================================================================
# Supabase Configuration (app_data deployment)
# Values are pulled from environment variables at runtime.
# ==============================================================================
supabase:
  db:
    host_env: "SUPABASE_DB_HOST"
    port_env: "SUPABASE_DB_PORT"
    name_env: "SUPABASE_DB_NAME"
    user_env: "SUPABASE_DB_USER"
    password_env: "SUPABASE_DB_PASSWORD"
    sslmode: "require"

# ==============================================================================
# Deployment
# 取得方式: Posit Connect -> Account Settings -> API Keys
# ==============================================================================
deployment:
  main_file: "scripts/global_scripts/10_rshinyapp_components/unions/union_production_test.R"
  target: "posit_connect"
  url: "https://connect.posit.cloud"
  account_name: "your_posit_connect_account"
  app_name: "d_racing-analytics"
  app_id: "d_racing-analytics"
  title: "D-Racing 技詮科技"

# ==============================================================================
# Pipeline - 啟用對應平台 (enabled: true)
# ==============================================================================
pipeline:
  platforms:
    amz:
      enabled: true
      drv_groups: ["D00", "D01", "D03", "D05"]
    all:
      enabled: true
      depends_on_platforms: ["amz"]
      drv_groups: ["D01", "D03"]
    precision:
      enabled: false

  execution:
    parallel_workers: 2

  scheduling:
    mode: "manual"
    schedule: "0 2 * * 0"  # cron: 每週日 2:00 AM
