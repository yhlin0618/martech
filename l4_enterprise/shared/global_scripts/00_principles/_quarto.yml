project:
  type: book
  output-dir: _book

book:
  title: "MAMBA Principles Documentation"
  author: "Development Team"
  date: "2025-08-16"
  
  chapters:
    - index.qmd
    
    - part: "English Version"
      chapters:
        - en/CH00_fundamental_principles/index.qmd
        - part: "General Principles"
          chapters:
            - en/CH00_fundamental_principles/01_general_principles/*.qmd
        - part: "Structure & Organization"
          chapters:
            - en/CH00_fundamental_principles/02_structure_organization/*.qmd
        - part: "Development Methodology"
          chapters:
            - en/CH00_fundamental_principles/03_development_methodology/*.qmd
        - part: "Data Management"
          chapters:
            - en/CH00_fundamental_principles/04_data_management/*.qmd
        - part: "Terminology & Standards"
          chapters:
            - en/CH00_fundamental_principles/05_terminology_standards/*.qmd
    
    - part: "中文版本 (Chinese Version)"
      chapters:
        - zh/CH00_fundamental_principles/index.qmd
        - part: "總綱 (General Principles)"
          chapters:
            - zh/CH00_fundamental_principles/01_general_principles/*.qmd
        - part: "結構與組織 (Structure & Organization)"
          chapters:
            - zh/CH00_fundamental_principles/02_structure_organization/*.qmd
        - part: "開發方法論 (Development Methodology)"
          chapters:
            - zh/CH00_fundamental_principles/03_development_methodology/*.qmd
        - part: "資料管理 (Data Management)"
          chapters:
            - zh/CH00_fundamental_principles/04_data_management/*.qmd
        - part: "術語與標準 (Terminology & Standards)"
          chapters:
            - zh/CH00_fundamental_principles/05_terminology_standards/*.qmd

format:
  html:
    theme: 
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    code-fold: true
    code-tools: true
    number-sections: true
    number-depth: 3
  pdf:
    documentclass: scrbook
    toc: true
    number-sections: true
    colorlinks: true