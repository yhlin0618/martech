  - name: "Review Analysis"
    description: "Extract product strengths/weaknesses from reviews"
    output_table: "df_comment_property_ratingonly_by_asin"

  - name: "Market Intelligence"
    description: "Understand competitive landscape through data"
    output_table: "df_position"
