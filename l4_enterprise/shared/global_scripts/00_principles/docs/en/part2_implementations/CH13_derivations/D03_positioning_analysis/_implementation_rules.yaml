    relevance: "Position table feeds interactive visualizations"

  - id: "MP047"
    title: "Functional Programming"
    relevance: "Use functional approaches for data transformation"

  - id: "R021"
    title: "One Function One File"
    relevance: "Each utility function in separate file"

  - id: "R069"
    title: "Function File Naming"
    relevance: "fn_ prefix for function files"

