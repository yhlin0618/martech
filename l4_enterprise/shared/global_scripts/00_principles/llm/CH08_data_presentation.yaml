# ========================================
# CH08: Data Presentation & Visualization
# Version: 1.0
# Last Updated: 2026-03-06
#
# Contains: DP_R001+ (Data Presentation Rules)
# Total: 1 rule (initial)
#
# Scope:
#   How data should be prepared and presented in charts, tables, and KPI cards.
#   This chapter sits between data management (CH02) and UI components (CH04):
#   - CH02 = how data is stored and transformed
#   - CH08 = how data is prepared for and rendered in visualizations
#   - CH04 = how UI components are structured and laid out
#
# Covers:
#   - Distribution visualization (histograms, density plots, box plots)
#   - Extreme value handling (Winsorization, capping, binning strategies)
#   - Scale selection (linear, log, percentile-based)
#   - Table formatting (number formatting, conditional styling)
#   - KPI card presentation (value formatting, trend indicators)
#   - Color and annotation standards (color-blind safe, hover text)
#   - Chart type selection guidelines
# ========================================

chapter: "CH08_data_presentation"
description: "Data Presentation & Visualization Principles and Rules"
principle_count: 3

principles:

  # ====================
  # DP_R RULES
  # ====================

  - id: DP_R001
    type: rule
    name: distribution_winsorization
    display_name: "Distribution Visualization Winsorization"
    one_liner: "Cap extreme values before rendering distribution charts to ensure readability"
    file_path: "CH10_data_presentation/rules/DP_R001_distribution_winsorization.qmd"

    rule_natural: |
      Distribution charts (histogram, bar chart, density plot) MUST handle extreme values
      before rendering. Raw data with heavy-tailed distributions becomes unreadable when
      plotted directly — a single bin absorbs most counts while others appear empty.

      Capping strategy by data type:
      - Discrete (count data, e.g. purchase frequency F):
        Cap at a fixed upper bound (default: 50).
        Values above cap are aggregated into an "N+" bin.
        Example: F values 1-50 shown individually, 51+ merged into "50+" bin.

      - Continuous (monetary, duration, e.g. purchase amount M, recency R):
        Cap at the 99th percentile by default.
        Values above cap are aggregated into the last bin.
        The cap threshold must be noted in the chart.

      Implementation requirements:
      - Original data is NEVER modified; capping happens only in the visualization layer.
      - The cap rule MUST be visible to the user (hover text, axis label "50+", or footnote).
      - The capped bin's hover text should show: "N+ (X customers)" with the actual count.
      - When a component already uses SQL-level aggregation (e.g. bar_plot_counts),
        apply the cap in the SQL query or aggregation step.

    rule_formal: |
      RULE DP_R001_WINSORIZATION:
      FOR chart IN [histogram, bar_chart, density_plot]:
        IF data_type(chart.field) == discrete:
          cap = config.get("cap_" + chart.field, default=50)
          chart.data = winsorize_discrete(chart.data, cap)
          chart.last_bin_label = str(cap) + "+"
        ELIF data_type(chart.field) == continuous:
          pct = config.get("cap_percentile_" + chart.field, default=0.99)
          cap_value = quantile(chart.data, pct)
          chart.data = winsorize_continuous(chart.data, cap_value)
          chart.annotation = "Capped at " + str(pct*100) + "th percentile"
        chart.original_data = UNCHANGED

    violations:
      - "Plotting raw f_value directly into plotly histogram without capping"
      - "Plotting raw m_value with extreme outliers compressing all other bins to zero"
      - "No indication to user that values were capped"
    compliant:
      - "F histogram caps at 50, last bin labeled '50+' with correct count"
      - "M histogram caps at 99th percentile, hover shows cap threshold"
      - "microDNADistribution bar_plot_counts uses min(max_f, 50) for frequency levels"

    examples:
      bad: |
        # Bad: raw values straight to histogram — F=1 dominates, rest invisible
        plotly::plot_ly(x = df$f_value, type = "histogram")

      good: |
        # Good: discrete cap for F
        cap <- 50
        vals <- pmin(df$f_value, cap)
        # Label the capped values
        labels <- ifelse(df$f_value > cap, paste0(cap, "+"), as.character(df$f_value))
        plotly::plot_ly(x = vals, type = "histogram", ...)

        # Good: percentile cap for M
        cap_val <- quantile(df$m_value, 0.99, na.rm = TRUE)
        vals <- pmin(df$m_value, cap_val)
        plotly::plot_ly(x = vals, type = "histogram", ...) %>%
          plotly::layout(annotations = list(
            text = paste0("Capped at 99th pctl: ", scales::dollar(cap_val)),
            showarrow = FALSE, xref = "paper", yref = "paper", x = 1, y = 1
          ))

    dependencies:
      - "MP029"  # No fake data — cap does not fabricate, only groups
      - "UI_R001"  # Component pattern — applies within ui_display rendering

    related:
      - "DM_R025"  # Type conversion — cap values must maintain correct type
      - "UI_R018"  # Download button — exported CSV should contain original values, not capped

    metadata:
      created: "2026-03-06"
      triggered_by: "Issue #248 — F/M histograms unreadable in customerValue when viewing all customers"
      existing_pattern: "microDNADistribution line 709: min(max_f, 50)"

  # ====================
  # MP153: Data Type Presentation Fidelity (Meta-Principle)
  # ====================

  - id: MP153
    type: meta_principle
    name: data_type_presentation_fidelity
    display_name: "Data Type Presentation Fidelity"
    one_liner: "Present data in formats that match the semantic type of the underlying values"
    file_path: "CH00_fundamental_principles/01_general_principles/MP153_data_type_presentation_fidelity.qmd"
    note: "Full definition in CH00_meta.yaml; referenced here as parent of DP_R002"

  # ====================
  # DP_R002: Integer Display Fidelity
  # ====================

  - id: DP_R002
    type: rule
    name: integer_display_fidelity
    display_name: "Integer Display Fidelity"
    one_liner: "Integer-typed values must never display decimal points in the UI"
    file_path: "CH10_data_presentation/rules/DP_R002_integer_display_fidelity.qmd"
    parent: MP153

    rule_natural: |
      Values that are semantically integers (counts, quantities, ranks) must be
      displayed without decimal points in all UI contexts: KPI cards, tables,
      charts, tooltips, and exported reports.

      DuckDB and R frequently promote integers to doubles during joins,
      aggregations, or column operations. The UI layer must explicitly convert
      these back to integers before rendering.

      Common integer fields: f_value (purchase frequency), customer_count,
      order_count, n_transactions, quantity, rank.

    rule_formal: |
      RULE DP_R002_INTEGER_FIDELITY:
      FOR ALL displayed_value V in UI:
        IF semantic_type(V) == integer_count:
          V_displayed = as.integer(V) OR formatRound(V, digits=0)
          decimal_point(V_displayed) == FALSE
      SCOPE: bs4ValueBox, DT::datatable, plotly hover, renderText, CSV export

    violations:
      - "f_value displayed as '3.0' in KPI card or data table"
      - "Customer Count showing '1247.0' in any UI element"
      - "Chart tooltip showing 'Orders: 5.00'"
    compliant:
      - "as.integer(f_value) before rendering in bs4ValueBox"
      - "DT::formatRound(columns = 'f_value', digits = 0)"
      - "Plotly hover text using paste0('F: ', as.integer(f_value))"

    examples:
      bad: |
        # Bad: raw value from DuckDB may be DOUBLE
        bs4ValueBox(value = data$f_value, ...)
        # Renders as "3.0" instead of "3"

      good: |
        # Good: explicit integer formatting
        bs4ValueBox(value = as.integer(data$f_value), ...)

        # Good: DT with formatRound
        datatable(df) %>%
          formatRound(columns = c("f_value", "customer_count"), digits = 0)

    dependencies:
      - "MP153"  # Parent meta-principle
      - "MP029"  # No fake data — as.integer() restores semantic type, doesn't fabricate

    related:
      - "DP_R001"  # Distribution Winsorization — also data presentation
      - "DM_R025"  # Type conversion — upstream cause of integer-to-double promotion
      - "DEV_R051"  # CSV download — exported data should also respect integer formatting

    metadata:
      created: "2026-03-07"
      triggered_by: "Issue #276 — Purchase count displayed with decimal points"
