  - id: MP149
    type: meta_principle
    name: data_transaction_integrity
    display_name: "Data Transaction Integrity"
    one_liner: "0IM imports must be auditable transactions: complete + reconciled or rollback"
    file_path: "CH00_fundamental_principles/04_data_management/MP149_data_transaction_integrity.qmd"

    rule_natural: |
      0IM import transaction requirements:
      - Discover all expected source units before write
      - Record terminal status for each source unit
      - Reconcile rows per-source and total rows after write
      - Reconcile critical keys (ASIN/order_id/sku) source vs local
      - Commit only when all mandatory checks pass
      - Roll back on mismatch/failure and stop pipeline
      - Emit machine-readable audit artifact for every run

    rule_formal: |
      RULE MP149_TRANSACTION:
      discover(source_units) BEFORE write
      validate(source_unit_status)
      validate(row_reconciliation)
      validate(critical_key_reconciliation)
      IF all_checks_pass THEN commit
      ELSE rollback AND fail_run
      emit audit_artifact

    violations:
      - "Committing partial 0IM imports with failed source units"
      - "No rollback when key reconciliation fails"
      - "No persisted audit report for completeness gate"
    compliant:
      - "dbBegin -> import -> reconcile -> dbCommit only on pass"
      - "dbRollback on any 0IM completeness mismatch"
      - "Per-run audit CSV with source-unit statuses and reconciliations"

