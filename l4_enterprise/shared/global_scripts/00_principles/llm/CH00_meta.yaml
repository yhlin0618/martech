# ====================
# 07_SECURITY (MP110-MP118)
# CRITICAL: These principles are MANDATORY for all development
# ====================

  - id: MP110
    type: meta_principle
    name: security_credentials_management
    display_name: "Security Credentials Management"
    one_liner: "Zero-tolerance policy: credentials MUST NEVER appear in source code"
    file_path: "CH00_fundamental_principles/07_security/MP110_security_credentials_management.qmd"
    criticality: "MAXIMUM"

    rule_natural: |
      If any file F is part of the source code repository,
      then F must NOT contain any credentials, API keys, passwords, tokens, or secrets.
      All secrets must be stored in environment variables or secure secret managers.
      This rule has NO exceptions.

    rule_formal: |
      RULE MP110_NO_CREDENTIALS:
      FOR ALL file F:
      IF is_in_repository(F)
      THEN NOT contains_password(F)
      AND NOT contains_api_key(F)
      AND NOT contains_token(F)

    violations:
      - "api_key <- 'sk-proj-abcd1234...'"
      - "Committing .env file to Git"
    compliant:
      - "api_key <- Sys.getenv('OPENAI_API_KEY')"
      - ".env in .gitignore"

  - id: MP111
    type: meta_principle
    name: data_privacy_protection
    display_name: "Data Privacy Protection"
    one_liner: "PII must be protected through encryption, anonymization, and access control"
    file_path: "CH00_fundamental_principles/07_security/MP111_data_privacy_protection.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      If data D contains PII or sensitive business data,
      then D must be protected: classification, encryption at rest/transit,
      anonymization for analytics, access control, audit logging.
      GDPR rights must be supported.

    rule_formal: |
      RULE MP111_PII:
      FOR ALL data D:
      IF contains_pii(D)
      THEN encrypted_at_rest(D)
      AND encrypted_in_transit(D)
      AND has_access_control(D)

    violations:
      - "Storing SSN in plain text"
      - "No access control on customer data"
    compliant:
      - "PII fields encrypted with AES-256"
      - "Access control matrix by role"

  - id: MP112
    type: meta_principle
    name: access_control_authorization
    display_name: "Access Control Authorization"
    one_liner: "All access must use RBAC with least privilege and audit trails"
    file_path: "CH00_fundamental_principles/07_security/MP112_access_control_authorization.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      If user U attempts to access resource R,
      then U must be authenticated, have explicit authorization,
      and the access must be logged.
      RBAC with least privilege required.

    rule_formal: |
      RULE MP112_RBAC:
      FOR ALL access_attempt:
      is_authenticated(user)
      AND has_permission(role(user), resource, action)
      AND is_logged(access_event)

    violations:
      - "Admin role to all users by default"
      - "No audit log of access events"
    compliant:
      - "RBAC with 5+ role levels"
      - "Immutable audit log"

  - id: MP113
    type: meta_principle
    name: secure_communication
    display_name: "Secure Communication"
    one_liner: "All communications must use TLS 1.2+ with proper certificate validation"
    file_path: "CH00_fundamental_principles/07_security/MP113_secure_communication.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      All network communication must use TLS 1.2+.
      HTTPS required for all web traffic.
      Database connections must use SSL.
      Weak cipher suites forbidden.

    rule_formal: |
      RULE MP113_TLS:
      FOR ALL connection C:
      tls_version(C) >= "1.2"
      AND NOT uses_weak_ciphers(C)

    violations:
      - "HTTP instead of HTTPS"
      - "Database without sslmode='require'"
    compliant:
      - "All traffic over HTTPS"
      - "PostgreSQL with sslmode='require'"

  - id: MP114
    type: meta_principle
    name: input_validation_sanitization
    display_name: "Input Validation Sanitization"
    one_liner: "All input must be validated and sanitized to prevent injection attacks"
    file_path: "CH00_fundamental_principles/07_security/MP114_input_validation_sanitization.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      All external input must be validated (type, format, range)
      and sanitized before processing.
      SQL must use parameterized queries.
      HTML output must be encoded.

    rule_formal: |
      RULE MP114_VALIDATION:
      FOR ALL input I:
      is_validated(I) AND is_sanitized(I)

      RULE MP114_SQL:
      FOR ALL sql_query Q:
      uses_parameterized_query(Q)
      AND NOT uses_string_concatenation(Q)

    violations:
      - "paste0('SELECT * FROM users WHERE id = ', user_input)"
      - "htmlOutput without htmlEscape()"
    compliant:
      - "dbGetQuery(con, 'SELECT * FROM users WHERE id = ?', params = list(id))"
      - "htmltools::htmlEscape(user_content)"

  - id: MP115
    type: meta_principle
    name: audit_logging_monitoring
    display_name: "Audit Logging Monitoring"
    one_liner: "All security events must be logged with real-time monitoring"
    file_path: "CH00_fundamental_principles/07_security/MP115_audit_logging_monitoring.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      Security events must be logged with sufficient detail.
      Logs must include: timestamp, event type, user ID, IP, action, result.
