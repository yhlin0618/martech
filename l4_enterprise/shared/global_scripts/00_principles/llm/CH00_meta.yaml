      - "Never tested restoration"
    compliant:
      - "Daily incremental + weekly full"
      - "Quarterly restoration tests"

  - id: MP118
    type: meta_principle
    name: development_security_practices
    display_name: "Development Security Practices"
    one_liner: "Security must be integrated into every development phase (DevSecOps)"
    file_path: "CH00_fundamental_principles/07_security/MP118_development_security_practices.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      Follow secure coding standards.
      Automated security testing (SAST, DAST, SCA).
      Security-focused code review.
