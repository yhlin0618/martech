  - id: MP122
    type: meta_principle
    name: penta_track_subrepo_architecture
    display_name: "Penta-Track Subrepo Architecture"
    one_liner: "Five independent git submodules in shared/: framework, scripts, language, config, and handbook layers"
    file_path: "CH00_fundamental_principles/02_structure_organization/MP122_penta_track_subrepo_architecture.qmd"

    rule_natural: |
      Penta-track architecture (upgraded from Quad-Track in v4.0, 2026-04-12):
      - Track 1 (global_scripts/): Framework layer — reusable R functions, principles, UI components
      - Track 2 (update_scripts/): Scripts layer — ETL/DRV scripts with company variants
      - Track 3 (nsql/): Language layer — NSQL grammar, dictionary, translators
      - Track 4 ({project_root}/): Configuration layer — per-project settings, NOT shared
      - Track 5 (handbook/): Handbook layer — operational guidance for interns and new staff
      All shared tracks (1, 2, 3, 5) live under shared/ as git submodules under kiki830621.
      Company projects reference shared/ directly; no git-subrepo dependency.
      Unidirectional code dependency: Config -> Scripts -> Language/Framework.
      Handbook is orthogonal: it is human-readable documentation consumed by interns,
      never imported or executed by any code track.
      Handbook content boundary:
      - Describes HOW to do things (git workflow, pipeline execution, debug procedures)
      - MUST NOT duplicate principles docs (which cover WHY) or wiki (business terminology)
      - MUST NOT assume framework code knowledge (interns should be able to read it cold)
      - Pure markdown only; NO build system (Quarto, MkDocs, etc. forbidden)
      Deployment (symlink resolution):
      - Symlinks require dual-repo deployment: dev repo + deploy repo (rsync -avL)
      - Deploy repo naming: ai_martech_{tier}_{COMPANY}_deploy
      - Makefile orchestrates: deploy-init, deploy-sync, deploy-diff, deploy-push

    rule_formal: |
      RULE MP122_PENTA_TRACK:
      shared_code in git_submodules(shared/)
      company_access via submodule_reference
      sync_process standard_git(commit, pull, push)
      five_tracks: global_scripts, update_scripts, nsql, company_config, handbook
      handbook_audience = interns_and_new_staff
      handbook_content_type = operational_guidance
      handbook_orthogonal_to_code: true

      RULE MP122_CONTENT_BOUNDARY:
      handbook FORBIDS duplicating(principles_docs, wiki, framework_internals)
      handbook REQUIRES inline_explanation when referencing framework_terms
      handbook REQUIRES pure_markdown(no_build_system)

      RULE MP122_DEPLOYMENT:
      deploy_requires dual_repo_pattern when symlinks_used
      dev_repo contains symlinks
      deploy_repo contains real_files via rsync("-avL")
      deploy_repo_name = "{dev_repo}_deploy"
      workflow: deploy-sync -> deploy-diff -> deploy-push

    violations:
      - "Copy-paste instead of using shared submodules"
      - "No version tracking"
      - "Adding framework internals or principle text to handbook"
      - "Building handbook with Quarto / MkDocs / etc. (must be pure markdown)"
      - "Making code tracks depend on handbook content"
      - "Deploying dev repo directly (symlinks won't resolve on server)"
      - "Manual file copying instead of rsync -avL"
    compliant:
      - "All shared tracks under shared/ as git submodules"
      - "cd shared/global_scripts && git add && git commit && git push"
      - "Handbook README declares audience and boundary with other docs"
      - "Interns can read handbook without opening principles docs"
      - "make deploy-sync && make deploy-push for deployment"

