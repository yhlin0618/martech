      - "SIEM integration"

  - id: MP116
    type: meta_principle
    name: dependency_vulnerability_management
    display_name: "Dependency Vulnerability Management"
    one_liner: "All dependencies must be scanned and patched according to severity SLAs"
    file_path: "CH00_fundamental_principles/07_security/MP116_dependency_vulnerability_management.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      Maintain complete dependency inventory (SBOM).
      Continuous vulnerability scanning.
      Patch SLAs: Critical 24h, High 7d, Medium 30d.
      Verify supply chain integrity.

    rule_formal: |
      RULE MP116_PATCHING:
      FOR ALL vulnerability V:
      IF severity(V) == "CRITICAL" THEN patch_within(24_hours)
      IF severity(V) == "HIGH" THEN patch_within(7_days)

    violations:
      - "No dependency scanning"
      - "Known CVE after 30 days"
    compliant:
      - "Weekly vulnerability scans"
      - "SBOM in CycloneDX format"

  - id: MP117
    type: meta_principle
    name: backup_disaster_recovery
    display_name: "Backup Disaster Recovery"
    one_liner: "All critical data must have 3-2-1 backups with tested recovery"
    file_path: "CH00_fundamental_principles/07_security/MP117_backup_disaster_recovery.qmd"
    criticality: "CRITICAL"

    rule_natural: |
      Critical data must follow 3-2-1 rule:
      3 copies, 2 media types, 1 offsite.
      Define RTO/RPO for all systems.
      Test backups quarterly.

    rule_formal: |
      RULE MP117_321:
      FOR ALL critical_data D:
      count(backup_copies(D)) >= 3
      AND count(media_types(D)) >= 2
      AND has_offsite_copy(D)

    violations:
