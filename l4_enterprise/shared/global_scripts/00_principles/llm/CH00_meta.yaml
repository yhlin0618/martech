      - "OWASP training quarterly"

  - id: MP145
    type: meta_principle
    name: documentation_implementation_alignment
    display_name: "Documentation-Implementation Alignment"
    one_liner: "Implementation scripts MUST faithfully execute their documented responsibility - no more, no less"
    file_path: "CH00_fundamental_principles/03_development_methodology/MP145_documentation_implementation_alignment.qmd"

    rule_natural: |
      Implementation scripts MUST faithfully execute their documented responsibility:
      - If documentation says X, code MUST do X
      - Code must NOT do X+Z (hidden side effects)
      - Code must NOT do X-W (missing functionality)
      - Exact alignment between documentation and implementation

    rule_formal: |
      RULE MP145_DOC_IMPL_ALIGN:
      FOR ALL documented_component C:
      implementation(C) = documentation(C)
      AND NOT (extra_functionality(C) OR missing_functionality(C))

    violations:
      - "Documentation says X, code does Y"
      - "Undocumented side effects in code"
      - "Partial implementation of documented behavior"
    compliant:
      - "Code does exactly what documentation specifies"
      - "No hidden functionality beyond docs"

  - id: MP146
    type: meta_principle
    name: canonical_variable_naming
    display_name: "Canonical Variable Naming"
    one_liner: "Use one canonical variable name per concept across all layers"
    file_path: "CH00_fundamental_principles/05_terminology_standards/MP146_canonical_variable_naming.qmd"

    rule_natural: |
      Canonical naming:
      - One canonical name per concept
      - No active synonyms
      - Same name in code, config, schema, docs, UI
      - Legacy names mapped only at boundaries

    rule_formal: |
      RULE MP146_CANONICAL_NAMING:
      FOR ALL concepts C:
      canonical_name(C) is unique
      AND NOT exists active_alias(C)

    violations:
      - "platform_code and platform_id both used"
      - "Mixed naming across layers"
      - "Legacy name propagated downstream"
    compliant:
      - "platform_id used end-to-end"
      - "Boundary-only legacy mapping"

  - id: MP147
    type: meta_principle
    name: non_redundant_information
    display_name: "Non-Redundant Information"
    one_liner: "Each fact must have a single authoritative representation"
    file_path: "CH00_fundamental_principles/05_terminology_standards/MP147_non_redundant_information.qmd"

    rule_natural: |
      Non-redundant information:
      - One authoritative representation per fact
      - No mirror fields for the same value
      - Key-implied values must not be repeated
      - If duplication is required, designate a source of truth and validate

    rule_formal: |
      RULE MP147_NON_REDUNDANT_INFO:
      FOR ALL facts F:
      count(authoritative_representations(F)) = 1
      AND derived_representations(F) MUST reference authoritative_representations(F)

    violations:
      - "platform_id repeated in key and value"
      - "Same constant duplicated across config and code"
      - "Two independent fields represent the same fact"
    compliant:
      - "Single source of truth with derived aliases"
      - "Key implies value without redundant field"

  - id: MP148
    type: meta_principle
    name: one_sentence_module_definition
    display_name: "One-Sentence Module Definition"
    one_liner: "Each module does one thing and is describable in one sentence"
    file_path: "CH00_fundamental_principles/05_terminology_standards/MP148_one_sentence_module_definition.qmd"

    rule_natural: |
      One-sentence modules:
      - Each module has a single responsibility
      - The purpose statement is exactly one sentence
      - Each module number maps to one action
      - If the purpose needs multiple sentences, split the module

    rule_formal: |
      RULE MP148_ONE_SENTENCE_MODULE:
      FOR ALL modules M:
      responsibility_count(M) = 1
      AND sentence_count(purpose_statement(M)) = 1

    violations:
      - "Module purpose requires multiple sentences"
      - "Single module performs validation and aggregation"
      - "D01_01 aggregates sales and computes DNA scores"
    compliant:
      - "Single-sentence purpose in module header"
      - "Separate modules for aggregation and scoring"

  - id: MP150
    type: meta_principle
    name: transparency_principle
    display_name: "Transparency Principle"
    one_liner: "Every operation, data movement, and state change must leave a visible trace"
    file_path: "CH00_fundamental_principles/03_development_methodology/MP150_transparency_principle.qmd"

    rule_natural: |
      The Transparency Principle: Nothing happens silently.
      Every significant operation must produce observable evidence:
      - Data movements are logged (DM_P007: Information Flow Transparency)
      - Console output is informative (DEV_P022: Console Output Transparency)
      - UI data acquisition is traced (UI_R024: Component Dataflow Logging)
      - Errors are explicit, never swallowed
      - State changes are announced

    rule_formal: |
      RULE MP150_TRANSPARENCY:
      FOR ALL operations O:
        IF is_significant(O)
        THEN has_observable_trace(O)
      CHILDREN:
        DM_P007: data_flow_transparency
        DEV_P022: console_output_transparency
      IMPLEMENTATIONS:
        UI_R024: ui_component_dataflow_logging

    violations:
      - "Silent execution with no log output"
      - "Hidden data transformations with no lineage"
      - "Error swallowed without message"
      - "State change with no announcement"
    compliant:
      - "Every data fetch logged with source, count, columns"
      - "Every ETL step shows progress and completion"
      - "Every error produces explicit message with context"

  - id: MP151
    type: meta_principle
    name: no_fallback_principle
    display_name: "No-Fallback Principle"
    one_liner: "Never mask failures with fallback logic"
    file_path: "CH00_fundamental_principles/03_development_methodology/MP151_no_fallback_principle.qmd"

    rule_natural: |
      Do not use fallback paths for core logic when an operation fails
      or an expected resource is missing. The system must fail fast
      with an explicit error and clear remediation instructions.
      Falling back to alternate behavior hides defects and creates
      non-deterministic outcomes.

    rule_formal: |
      RULE MP151_NO_FALLBACK:
      FOR ALL core_operations O:
        IF precondition_not_met(O)
        THEN stop_with_error(O, remediation_message)
        NEVER return_default_value(O)
      SCOPE: initialization, config loading, data access, transformation
      STRICTNESS: binary (no exceptions for core workflows)

    violations:
      - "tryCatch returning empty tibble on data load failure"
      - "if-else returning default config when file missing"
      - "Silent fallback to 'all' when product_line_id is NULL"
      - "Partial batch edits continuing after step failure"
    compliant:
      - "stop() with explicit message when config file missing"
      - "Validation at entry point, fail before processing"
      - "Unit tests asserting errors for invalid preconditions"

  - id: MP152
    type: meta_principle
    name: breaking_version_principle
    display_name: "Breaking Version Principle"
    one_liner: "Major version upgrades must be explicit migrations, not implicit compatibility"
    file_path: "CH00_fundamental_principles/03_development_methodology/MP152_breaking_version_principle.qmd"

    rule_natural: |
      A new version release must define a single expected contract,
      and legacy behavior must not be silently tolerated. When
      compatibility is intentionally broken, migration must be explicit:
      inputs, configuration, and execution entry points are upgraded
      through documented migration steps before the new version is executed.

    rule_formal: |
      RULE MP152_BREAKING_VERSION:
      FOR ALL version_upgrades V:
        IF breaks_compatibility(V)
        THEN requires_explicit_migration(V)
        AND no_hidden_legacy_branches(V.new_version)
        AND migration_is_checkable(V)
      SCOPE: configs, schemas, API contracts, deployment entry files

    violations:
      - "v2 code silently falling back to v1 config format"
      - "Legacy compatibility branches without deprecation plan"
      - "Partial patching to keep old and new versions running together"
    compliant:
      - "Migration gate: stop if v2 config missing, suggest migration command"
      - "Versioned, idempotent migration artifacts"
      - "Post-migration verification with failure-injection checks"

  - id: MP153
    type: meta_principle
    name: data_type_presentation_fidelity
    display_name: "Data Type Presentation Fidelity"
    one_liner: "Present data in formats that match the semantic type of the underlying values"
    file_path: "CH00_fundamental_principles/01_general_principles/MP153_data_type_presentation_fidelity.qmd"

    rule_natural: |
      Every data value has a semantic type (integer count, percentage, currency,
      date, ratio, etc.) that dictates how it should be displayed. The presentation
      format must match the semantic type, not the storage type or the default
      rendering of the UI framework.

      When data flows through ETL, derivation, and UI layers, its storage type
      may change (e.g., an integer count stored as DOUBLE in DuckDB). The UI layer
      must explicitly format values according to their semantic type to prevent
      misleading displays (e.g., purchase count "3.0" instead of "3").

    rule_formal: |
      RULE MP153_DATA_TYPE_FIDELITY:
      FOR ALL displayed_value V in UI:
        semantic_type(V) DETERMINES format_function(V)
        format_function(V) MUST be explicitly applied before rendering
        default_rendering(V) is INSUFFICIENT
      EXAMPLES:
        integer_count → as.integer() or format(digits=0)
        currency → scales::dollar() or formatC(digits=2)
        percentage → scales::percent()
        ratio_score → round(x, 2)

    violations:
      - "Purchase count displayed as '3.0' due to DuckDB DOUBLE promotion"
      - "Customer count showing decimal points in KPI cards"
      - "Relying on default DT rendering without explicit column formatting"
    compliant:
      - "as.integer(f_value) before rendering in bs4ValueBox"
      - "scales::dollar(revenue) for currency values"
      - "scales::percent(rate, accuracy=0.1) for percentages"

  - id: MP154
    type: meta_principle
    name: side_effect_defense
    display_name: "Side Effect Defense"
    one_liner: "Operations must not silently alter the semantic meaning of data"
    file_path: "CH00_fundamental_principles/03_development_methodology/MP154_side_effect_defense.qmd"

    rule_natural: |
      Any operation that transforms data must not silently change the semantic
      meaning of existing values. When a transformation cannot fully resolve,
      the failure must be visible — either through an explicit sentinel value,
      an error, or a warning — never through silent data corruption.

      Never silently replace valid data with NA or NULL. Preserve semantic
      consistency of columns (an ID column must contain IDs, not a mix of IDs
      and raw names). Warn loudly on partial failure with actionable detail.
      Prefer crashing over silent corruption.

    rule_formal: |
      RULE MP154_SIDE_EFFECT_DEFENSE:
      FOR ALL transformation operations T on data D:
        IF T(value) cannot fully resolve:
          result := sentinel_value OR stop(error_message)
          warning(actionable_detail) MUST be emitted
        NEVER:
          result := NA  # silent data loss
          result := semantically_inconsistent_value
      COROLLARY:
        stop() is PREFERRED over silent corruption

    violations:
      - "Mapping failure silently produces NA, dropping rows in downstream joins"
      - "Type coercion returns NA without warning"
      - "Missing config key returns NULL, causing silent degraded behavior"
    compliant:
      - "Assign 'UNKNOWN' sentinel + warning() with original values listed"
      - "stop('Missing required config: ...') on absent key"
      - "tryCatch with message() logging failure reason, not silently continuing"

