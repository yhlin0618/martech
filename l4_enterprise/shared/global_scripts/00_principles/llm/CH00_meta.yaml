principles:

  # ====================
  # 01_GENERAL_PRINCIPLES
  # ====================

  - id: MP001
    type: meta_principle
    name: axiomatization_system
    display_name: "Axiomatization System"
    one_liner: "Establish formal foundations for the principles system"
    file_path: "CH00_fundamental_principles/01_general_principles/MP001_axiomatization_system.qmd"

    rule_natural: |
      The principles system must be built on formal foundations:
      - Define primitive terms clearly
      - Establish axioms as starting points
      - Derive rules from axioms
      - Maintain consistency across principles

    rule_formal: |
      RULE MP001_AXIOM:
      principles_system has:
        primitive_terms (defined)
        axioms (foundational)
        derived_rules (from axioms)
        consistency (verified)

    violations:
      - "Undefined terms in principles"
      - "Circular definitions"
    compliant:
      - "Clear term definitions"
      - "Traceable rule derivations"

  - id: MP002
    type: meta_principle
    name: primitive_terms_and_definitions
    display_name: "Primitive Terms and Definitions"
    one_liner: "Define core terminology precisely"
    file_path: "CH00_fundamental_principles/01_general_principles/MP002_primitive_terms_and_definitions.qmd"

    rule_natural: |
      Core terms must be precisely defined:
      - Meta-Principle (MP): Architectural foundation
      - Principle (P): Implementation guideline
      - Rule (R): Specific implementation pattern
      - Each level has clear scope

    rule_formal: |
      RULE MP002_TERMS:
      term_hierarchy = {
        meta_principle: "system architecture foundation",
        principle: "implementation guideline",
        rule: "specific pattern"
      }
      priority: MP > P > R

    violations:
      - "Using undefined terms"
      - "Mixing term levels"
    compliant:
      - "Consistent terminology usage"

  - id: MP003
    type: meta_principle
    name: structural_blueprint
    display_name: "Structural Blueprint"
    one_liner: "Follow the defined structural patterns"
    file_path: "CH00_fundamental_principles/01_general_principles/MP003_structural_blueprint.qmd"

    rule_natural: |
      System structure follows blueprints:
      - Directory structure is prescribed
      - File organization is standardized
      - Component relationships defined
      - Changes follow evolution patterns

    rule_formal: |
      RULE MP003_BLUEPRINT:
      system_structure follows prescribed_blueprint
      AND changes follow evolution_patterns

    violations:
      - "Ad-hoc directory structures"
      - "Unplanned file organization"
    compliant:
      - "Following documented structure"

  - id: MP004
    type: meta_principle
    name: sensible_defaults
    display_name: "Sensible Defaults"
    one_liner: "Provide sensible defaults that work out of box"
    file_path: "CH00_fundamental_principles/01_general_principles/MP004_sensible_defaults.qmd"

    rule_natural: |
      Systems should work with sensible defaults:
      - Default values are production-ready
      - Configuration optional, not required
      - Defaults documented clearly
      - Override mechanism provided

    rule_formal: |
      RULE MP004_DEFAULTS:
      FOR ALL configuration C:
      has_sensible_default(C)
      AND default_is_documented(C)
      AND can_be_overridden(C)

    violations:
      - "Required configuration without defaults"
      - "Undocumented defaults"
    compliant:
      - "Works out of box with defaults"

  - id: MP005
    type: meta_principle
    name: statute_law_analogy
    display_name: "Statute Law Analogy"
    one_liner: "Principles system works like statutory law"
    file_path: "CH00_fundamental_principles/01_general_principles/MP005_statute_law_analogy.qmd"

    rule_natural: |
      Principles are like statutes:
      - Higher principles override lower
      - Later principles amend earlier
      - Interpretation follows precedent
      - Changes require formal process

    rule_formal: |
      RULE MP005_STATUTE:
      principle_system follows:
        hierarchy (higher overrides lower)
        amendment_process (formal changes)
        precedent (consistent interpretation)

    violations:
      - "Ignoring principle hierarchy"
      - "Informal principle changes"
    compliant:
      - "Following formal amendment process"

  - id: MP006
    type: meta_principle
    name: parsimony
    display_name: "Parsimony"
    one_liner: "Prefer simpler solutions over complex ones"
    file_path: "CH00_fundamental_principles/01_general_principles/MP006_parsimony.qmd"

    rule_natural: |
      Simplicity is preferred:
      - Simplest solution that works
      - Avoid unnecessary complexity
      - Complexity must be justified
      - Refactor toward simplicity

    rule_formal: |
      RULE MP006_PARSIMONY:
      prefer simple_solution > complex_solution
      IF complexity THEN must_be_justified

    violations:
      - "Over-engineered solutions"
      - "Unnecessary abstractions"
    compliant:
      - "Minimal viable implementation"

  - id: MP007
    type: meta_principle
    name: cognitive_distinction
    display_name: "Cognitive Distinction"
    one_liner: "Maintain clear cognitive boundaries"
    file_path: "CH00_fundamental_principles/01_general_principles/MP007_cognitive_distinction.qmd"

    rule_natural: |
      Keep concepts clearly separated:
      - Each module has clear purpose
      - Boundaries are explicit
      - Overlaps are documented
      - Changes respect boundaries

    rule_formal: |
      RULE MP007_COGNITIVE:
      FOR ALL module M:
      has_clear_purpose(M)
      AND has_explicit_boundary(M)

    violations:
      - "Modules with mixed concerns"
      - "Unclear boundaries"
    compliant:
      - "Single-purpose modules"

  - id: MP008
    type: meta_principle
    name: replicability_principle
    display_name: "Replicability Principle"
    one_liner: "Results must be reproducible"
    file_path: "CH00_fundamental_principles/01_general_principles/MP008_replicability_principle.qmd"

    rule_natural: |
      All results should be reproducible:
      - Same inputs produce same outputs
      - Random seeds are set
      - Environment is documented
      - Steps are recorded

    rule_formal: |
      RULE MP008_REPLICATE:
      FOR ALL process P:
      same_inputs(P) produces same_outputs(P)
      AND environment_documented(P)

    violations:
      - "Non-reproducible analyses"
      - "Undocumented random seeds"
    compliant:
      - "set.seed() before random ops"

  - id: MP100
    type: meta_principle
    name: utf8_encoding_standard
    display_name: "UTF-8 Encoding Standard"
    one_liner: "Use UTF-8 encoding for all files"
    file_path: "CH00_fundamental_principles/01_general_principles/MP100_utf8_encoding_standard.qmd"

    rule_natural: |
      All files must use UTF-8:
      - Source files in UTF-8
      - Data files in UTF-8
      - Output files in UTF-8
      - BOM when needed for Excel

    rule_formal: |
      RULE MP100_UTF8:
      FOR ALL file F:
      encoding(F) = UTF-8
      IF for_excel THEN include_BOM

    violations:
      - "Latin-1 encoded files"
      - "Mixed encodings"
    compliant:
      - "Consistent UTF-8 encoding"

  # ====================
  # 02_STRUCTURE_ORGANIZATION
  # ====================

  - id: MP009
