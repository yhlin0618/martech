    must_read:
      - MP064  # ETL-Derivation separation
      - MP108  # ETL phase sequence
      - MP149  # 0IM transactional completeness gate
      - MP029  # No fake data
      - DM_R041  # Directory structure
    optional:
      - DM_R023  # If accessing databases
    chapter_files: []  # Core principles sufficient
    checklist:
      - "Is the script in the ETL/{platform}/ directory?"
      - "Does the filename follow {platform}_ETL{datatype}_{phase}.R?"
      - "Is there NO business logic in the ETL script?"
      - "Are phases executed in order: 0IM → 1ST → 2TR?"
      - "Does 0IM use commit/rollback with row+key reconciliation?"
      - "Is no script in the root update_scripts/ directory?"

  building_derivation:
    description: "Creating Derivation scripts for business logic"
    complexity: moderate
    must_read:
