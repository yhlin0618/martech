      - "push 前先 pull"
      - "禁止批量提交"

# ============================================================
# PRIORITY ORDER (Conflict Resolution)
# ============================================================
priority_order:
  - level: 1
    type: meta_principle
    prefix: "MP"
    description: "System architecture constraints. Highest priority. Cannot be overridden."
    examples: ["MP029", "MP064", "MP108"]

  - level: 2
    type: principle
    prefix: ["SO_P", "DM_P", "DEV_P", "UI_P", "TD_P"]
    description: "Implementation guidelines. High priority. Override rules when conflicting."
    examples: ["UI_P004", "DEV_P001"]

  - level: 3
    type: rule
    prefix: ["SO_R", "DM_R", "DEV_R", "UI_R", "TD_R"]
    description: "Specific implementation patterns. Normal priority."
    examples: ["DM_R023", "SO_R007"]

conflict_resolution: |
  When two principles conflict in a specific situation:

  1. Check priority levels: Higher level (lower number) wins.
     MP > P > R

  2. If same level, check dependencies:
     If A requires B, then B takes precedence in the conflicting aspect.

  3. If still ambiguous, apply the principle that:
     - Has more specific applicability to the current scenario
     - Was created/modified more recently

  4. Document the resolution decision in code comments.

