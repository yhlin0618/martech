# ============================================================
# REFERENCE FORMAT & FILE LOCATIONS
# ============================================================
reference_format:
  standard: "{TYPE}{NUMBER}_{snake_case_name}"
  correct_examples:
    - "MP029_discrepancy_principle"
    - "DM_R023_universal_dbi_approach"
    - "SO_R007_one_function_one_file"
  deprecated_formats:
    - pattern: "CH00.MP029"
      reason: "Do not use chapter prefix"
    - pattern: "MP029: No Fake Data"
      reason: "Do not use colon with title"
    - pattern: "R92"
      reason: "Always use full domain prefix (DM_R092)"

file_locations:
  principles_root: "00_principles/"
  llm_root: "llm/"
  english_principles: "docs/en/part1_principles/"
  chinese_principles: "docs/zh/part1_principles/"
  chapter_mapping:
    CH00: "Fundamental Meta-Principles (MP only)"
    CH01: "Structure & Organization (SO_P, SO_R)"
    CH02: "Data Management (DM_P, DM_R)"
    CH03: "Development Methodology (DEV_P, DEV_R)"
    CH04: "UI Components (UI_P, UI_R)"
    CH05: "Testing & Deployment (TD_P, TD_R)"
    CH06: "Integration & Collaboration (IC_P, IC_R)"
    CH07_security: "Security rules (SEC_R, R118 env loading)"
    CH08_user_experience: "User Experience principles (UX_P)"
    CH09_etl_pipelines: "ETL pipeline rules (R116-R120 family)"
  path_template: "docs/en/part1_principles/{CHAPTER}/{principles|rules}/{ID}_{name}.qmd"

# ============================================================
# ENTITY DEFINITIONS
# ============================================================
entities:
  - name: Principle
    attributes: [id, type, name, description, status]
    description: "A documented rule, guideline, or constraint in the MAMBA system"

  - name: CodeFile
    attributes: [path, layer, file_type, platform]
    description: "A source code file in the MAMBA codebase"

  - name: DataLayer
    attributes: [name, phase, purpose]
    description: "A layer in the data processing pipeline"

  - name: Scenario
    attributes: [name, description, complexity]
    description: "A development situation that requires principle guidance"

  - name: Function
    attributes: [name, file_path, layer, purpose]
    description: "An R function in the codebase"

# ============================================================
# RELATION DEFINITIONS
# ============================================================
relations:
  - name: requires
    signature: "Principle requires Principle"
    description: "The first principle depends on the second principle being satisfied"

  - name: applies_to
    signature: "Principle applies_to Scenario"
    description: "The principle is relevant when working in this scenario"

  - name: conflicts_with
    signature: "Principle conflicts_with Principle"
    description: "The two principles cannot both be fully satisfied simultaneously"

  - name: in_layer
    signature: "Function in_layer DataLayer"
    description: "The function belongs to the specified data layer"

  - name: uses_function
    signature: "CodeFile uses_function Function"
    description: "The code file calls or references the function"

# ============================================================
# DATA LAYERS (Domain Knowledge)
# ============================================================
data_layers:
  - name: raw_data
    phase: "0IM"
    purpose: "Original data as extracted from external sources"
    allowed_operations: ["extract", "preserve_structure", "add_metadata"]
    prohibited_operations: ["transform", "calculate", "aggregate"]

  - name: staged_data
    phase: "1ST"
    purpose: "Data with standardized encoding and fixed structural issues"
    allowed_operations: ["standardize_encoding", "fix_dates", "validate"]
    prohibited_operations: ["business_calculation", "aggregation"]

  - name: transformed_data
    phase: "2TR"
    purpose: "Schema-standardized data with structural JOINs"
    allowed_operations: ["type_conversion", "join_reference", "denormalize"]
    prohibited_operations: ["business_logic", "aggregation"]

  - name: derived_data
    phase: "DRV"
    purpose: "Business-level calculations and aggregations"
    allowed_operations: ["calculate", "aggregate", "apply_business_rules"]
    input_requirement: "Must consume from transformed_data layer"

  - name: app_data
    phase: "APP"
    purpose: "Application-ready data for UI consumption"
    source: "derived_data or transformed_data"

# ============================================================
# CORE PRINCIPLES (13 High-Frequency Principles)
# ============================================================
# These are the most frequently used principles.
# Full definitions here - no need to read chapter files for these.
# ============================================================

principles:

  # ----------------------------------------------------------
  # MP029: Discrepancy Principle (No Fake Data)
  # ----------------------------------------------------------
  - id: MP029
    type: meta_principle
    name: discrepancy_principle
    display_name: "No Fake Data"
    one_liner: "Never generate fake data; only use real data from actual sources"
    file_path: "CH00_fundamental_principles/04_data_management/MP029_discrepancy_principle.qmd"

    rule_natural: |
      If a data object X is used in any production code or analysis,
      then X must NOT be generated, fabricated, or simulated.
      X must come from a real data source such as a database, API, or data file.
      The only exception is for unit tests that explicitly test edge cases.

    rule_formal: |
      RULE MP029_CHECK:
      FOR ALL data_object X:
      IF used_in_production(X)
      THEN NOT is_generated(X)
      AND NOT is_fabricated(X)
      AND has_real_source(X)

      EXCEPTION:
      IF context_is_unit_test()
      AND tests_edge_case(X)
      THEN is_generated(X) IS ALLOWED

    applies_to:
      - data_operation
      - etl_development
      - testing
      - analysis

    violations:
      - "Using rnorm(), runif(), or sample() to generate test data in production code"
      - "Hardcoding data values directly in source code"
      - "Creating synthetic customer records for demos"
      - "Using placeholder values like 'test_user' or 'dummy_data'"

    compliant:
      - "Using tbl2() to read data from database"
      - "Using read_csv() or read_excel() to load real data files"
      - "Querying API endpoints to fetch actual data"
      - "Using database fixtures with real anonymized data for tests"

  # ----------------------------------------------------------
  # MP064: ETL-Derivation Separation
  # ----------------------------------------------------------
  - id: MP064
    type: meta_principle
    name: etl_derivation_separation
    display_name: "ETL-Derivation Separation"
    one_liner: "ETL handles pure data preparation; Derivation handles business logic"
    file_path: "CH00_fundamental_principles/04_data_management/MP064_etl_derivation_separation.qmd"

    rule_natural: |
      If a function F is located in an ETL directory or has ETL in its filename,
      then F must NOT contain any business logic or business calculations.
      F must only perform data extraction, transformation, and loading operations.
      All business logic must be placed in Derivation (DRV) scripts.

    rule_formal: |
      RULE MP064_ETL_CHECK:
      FOR ALL function F:
      IF in_directory(F, "ETL/")
      OR has_pattern(filename(F), "*_ETL_*")
      THEN NOT has_business_logic(F)
      AND NOT performs_aggregation(F)
      AND NOT calculates_metrics(F)

      RULE MP064_DRV_CHECK:
      FOR ALL function F:
      IF has_business_logic(F)
      THEN in_directory(F, "DRV/")
      OR has_pattern(filename(F), "*_D*")

    applies_to:
      - etl_development
      - data_pipeline
      - derivation_development

    requires:
      - MP029  # Data must be real before we separate ETL from DRV

    violations:
      - "Calculating RFM scores in an ETL script"
      - "Computing customer lifetime value in a _2TR.R file"
      - "Aggregating sales by customer segment in ETL layer"
      - "Applying business rules for customer classification in ETL"

    compliant:
      - "ETL script only does SELECT, JOIN, and FILTER operations"
      - "ETL script standardizes date formats and encoding"
      - "Business calculations are in drv_customer_metrics.R"
      - "Aggregations are in DRV/platform/platform_D01_01.R"

  # ----------------------------------------------------------
  # DM_R023: Universal DBI Approach
  # ----------------------------------------------------------
  - id: DM_R023
    type: rule
    name: universal_dbi_approach
    display_name: "Universal DBI"
    one_liner: "Use tbl2() instead of dplyr::tbl() for all database access"
    file_path: "CH02_data_management/rules/DM_R023_universal_dbi_approach.qmd"

    rule_natural: |
      If you need to access a database table in any R code,
      then you must use the tbl2() function from global_scripts.
      You must NOT use dplyr::tbl() directly.
      tbl2() provides consistent handling of database connections and error handling.

    rule_formal: |
      RULE DM_R023_CHECK:
      FOR ALL code_file C:
      IF needs_database_table_access(C)
      THEN uses_function(C, "tbl2")
      AND NOT uses_function(C, "dplyr::tbl")
      AND NOT uses_function(C, "tbl")

    applies_to:
      - database_connection
      - data_access
      - etl_development
      - derivation_development

    requires:
      - MP029  # tbl2 ensures data comes from real source

    violations:
      - "Using dplyr::tbl(con, 'customers') directly"
      - "Using tbl(con, 'orders') without the tbl2 wrapper"
      - "Directly constructing SQL without using the access pattern"

    compliant:
      - "tbl2(con, 'customers') %>% filter(active == TRUE)"
      - "Using tbl2() in all database access code"
      - "Source global_scripts/02_db_utils/fn_tbl2.R before database operations"

  # ----------------------------------------------------------
  # SO_R007: One Function One File
  # ----------------------------------------------------------
  - id: SO_R007
    type: rule
    name: one_function_one_file
    display_name: "One Function One File"
    one_liner: "Each function should be in its own file named fn_{function_name}.R"
    file_path: "CH01_structure_organization/rules/SO_R007_one_function_one_file.qmd"

    rule_natural: |
      If you create a new function in the MAMBA codebase,
      then the function must be placed in its own file.
      The file must be named fn_{function_name}.R where function_name matches the function.
      Multiple functions should NOT be defined in the same file.

    rule_formal: |
      RULE SO_R007_CHECK:
      FOR ALL function F:
      IF is_defined_in(F, file)
      THEN filename(file) EQUALS "fn_" + name(F) + ".R"
      AND count_functions_in(file) EQUALS 1

    applies_to:
      - function_creation
      - code_organization
      - refactoring

    violations:
      - "Defining helper functions inside another function file"
      - "Creating utils.R with multiple utility functions"
      - "Naming a function file without the fn_ prefix"

    compliant:
      - "fn_calculate_rfm.R contains only calculate_rfm()"
      - "fn_validate_customer.R contains only validate_customer()"
      - "Each function has exactly one file, named correctly"

  # ----------------------------------------------------------
  # UI_P004: Component N-Tuple Pattern
  # ----------------------------------------------------------
  - id: UI_P004
    type: principle
    name: component_ntuple_pattern
    display_name: "Component N-Tuple Pattern"
    one_liner: "Every UI component must have UI, Server, and Defaults parts"
    file_path: "CH04_ui_components/principles/UI_P004_component_ntuple_pattern.qmd"

    rule_natural: |
      If you create a Shiny UI component,
      then you must create three files for the component.
      The UI function goes in componentNameUI.R.
      The Server function goes in componentNameServer.R.
      The Defaults specification goes in componentNameDefaults.R.
      All three must use the same component name prefix.

    rule_formal: |
      RULE UI_P004_CHECK:
      FOR ALL ui_component C:
      IF is_shiny_component(C)
      THEN exists_file(name(C) + "UI.R")
      AND exists_file(name(C) + "Server.R")
      AND exists_file(name(C) + "Defaults.R")

    applies_to:
      - ui_development
      - shiny_component_creation

    violations:
      - "Creating a component with only UI and Server, missing Defaults"
      - "Using inconsistent names like customerUI.R and customerModuleServer.R"
      - "Putting UI and Server in the same file"

    compliant:
      - "customerDNA/customerDNAUI.R, customerDNAServer.R, customerDNADefaults.R"
      - "All three files exist with matching prefixes"

  # ----------------------------------------------------------
  # MP108: ETL Phase Sequence
  # ----------------------------------------------------------
  - id: MP108
    type: meta_principle
    name: etl_phase_sequence
    display_name: "ETL Phase Sequence"
    one_liner: "ETL must follow strict 0IM → 1ST → 2TR phase sequence"
    file_path: "CH00_fundamental_principles/04_data_management/MP108_etl_phase_sequence.qmd"

    rule_natural: |
      If you are developing ETL scripts,
      then you must follow the three-phase sequence.
      Phase 0IM (Import) comes first and handles raw data extraction.
      Phase 1ST (Staging) comes second and handles standardization.
      Phase 2TR (Transform) comes third and handles schema normalization.
      Scripts must be named with the phase indicator.

    rule_formal: |
      RULE MP108_SEQUENCE:
      FOR ALL etl_pipeline P:
      IF has_phase(P, "1ST")
      THEN has_completed_phase(P, "0IM")

      IF has_phase(P, "2TR")
      THEN has_completed_phase(P, "1ST")

      FOR ALL etl_script S:
      filename(S) MATCHES "{platform}_ETL{datatype}_{phase}.R"
      WHERE phase IN ["0IM", "1ST", "2TR"]

    applies_to:
      - etl_development
      - data_pipeline

    requires:
      - MP064  # Builds on ETL-Derivation separation

    violations:
      - "Skipping 1ST phase and going directly from 0IM to 2TR"
      - "Running 2TR before 1ST is complete"
      - "Mixing phases in a single script"

    compliant:
      - "cbz_ETL01_0IM.R runs first"
      - "cbz_ETL01_1ST.R runs after 0IM completes"
      - "cbz_ETL01_2TR.R runs after 1ST completes"

  # ----------------------------------------------------------
  # MP149: Data Transaction Integrity
  # ----------------------------------------------------------
  - id: MP149
    type: meta_principle
    name: data_transaction_integrity
    display_name: "Data Transaction Integrity"
    one_liner: "0IM must commit only after auditable completeness checks pass; otherwise rollback"
    file_path: "CH00_fundamental_principles/04_data_management/MP149_data_transaction_integrity.qmd"

    rule_natural: |
      For 0IM imports from external sources, treat the run as one data transaction.
      Discover all source units before writing.
      Track per-unit terminal status (IMPORTED, EMPTY, SKIPPED, FAILED).
      Reconcile rows and critical keys (such as ASIN) after write.
      Commit only if all mandatory checks pass.
      Roll back and fail the run on any mismatch.
      Persist an audit artifact for each run.

    rule_formal: |
      RULE MP149_0IM_TRANSACTION:
      FOR ALL import_run R:
      discover_source_units(R) BEFORE write(R)
      AND has_per_unit_status(R)
      AND has_row_reconciliation(R)
      AND has_key_reconciliation(R)
      IF checks_pass(R) THEN commit(R)
      ELSE rollback(R) AND fail(R)
      AND emit_audit_artifact(R)

    applies_to:
      - etl_development
      - data_pipeline
      - import_validation

    requires:
      - MP108
      - MP102

    violations:
      - "0IM continues with partial import after failed files"
      - "No rollback when ASIN reconciliation fails"
      - "No persisted audit report for import run"

    compliant:
      - "dbBegin -> import -> reconcile -> dbCommit on pass"
      - "dbRollback + stop on mismatch"
      - "Audit CSV emitted for each run"

  # ----------------------------------------------------------
  # MP001: Axiomatization System
  # ----------------------------------------------------------
  - id: MP001
    type: meta_principle
    name: axiomatization_system
    display_name: "Axiomatization System"
    one_liner: "Principles form a formal axiomatized system with explicit relationships and dependencies"
    file_path: "CH00_fundamental_principles/01_general_principles/MP001_axiomatization_system.qmd"

    rule_natural: |
      The MAMBA principles system is organized as a formal axiomatization.
      Principles are classified into levels: Meta-Principles (MP), Principles (P), and Rules (R).
      Meta-Principles define fundamental concepts and architecture.
      Principles provide implementation guidance.
      Rules specify concrete implementation patterns.
      Each principle must document its relationships (derives_from, influences, implements).

    rule_formal: |
      RULE MP001_CLASSIFICATION:
      FOR ALL principle X:
      type(X) IN ["meta_principle", "principle", "rule"]

      IF type(X) EQUALS "meta_principle"
      THEN chapter(X) EQUALS "CH00"

      IF type(X) IN ["principle", "rule"]
      THEN chapter(X) IN ["CH01", "CH02", "CH03", "CH04", "CH05"]

      RULE MP001_PRIORITY:
      priority("meta_principle") > priority("principle") > priority("rule")

    applies_to:
      - principle_creation
      - architecture_design
      - documentation

    violations:
      - "Creating a rule in CH00 (fundamental chapter)"
      - "Not documenting principle dependencies"
      - "Mixing principle levels without clear hierarchy"

    compliant:
      - "MP principles only in CH00_fundamental_principles/"
      - "SO_P principles in CH01_structure_organization/"
      - "All principles have derives_from and influences metadata"

  # ----------------------------------------------------------
  # SO_P002: Script Separation
  # ----------------------------------------------------------
  - id: SO_P002
    type: principle
    name: script_separation
    display_name: "Script Separation"
    one_liner: "Update scripts orchestrate; global_scripts contain core functionality"
    file_path: "CH01_structure_organization/principles/SO_P002_script_separation.qmd"

    rule_natural: |
      Update scripts should be simple orchestration files.
      They should focus on WHAT to do, not HOW to do it.
      All complex logic must be in global_scripts as reusable functions.
      Update scripts call functions from global_scripts.
      Update scripts should be readable as workflow documentation.

    rule_formal: |
      RULE SO_P002_UPDATE_SCRIPTS:
      FOR ALL script S:
      IF in_directory(S, "update_scripts/")
      AND NOT in_directory(S, "global_scripts/")
      THEN complexity(S) EQUALS "low"
      AND contains_function_definitions(S) EQUALS FALSE
      AND calls_global_functions(S) EQUALS TRUE

      RULE SO_P002_GLOBAL_SCRIPTS:
      FOR ALL function F:
      IF is_reusable(F)
      THEN defined_in_directory(F, "global_scripts/")

    applies_to:
      - project_organization
      - code_structure
      - script_development

    violations:
      - "Defining complex functions in update scripts"
      - "Copy-pasting similar logic across multiple update scripts"
      - "Update script with >100 lines of business logic"

    compliant:
      - "Update script sources init, calls global functions, sources deinit"
      - "All reusable functions in global_scripts/"
      - "Update script reads like a workflow specification"

  # ----------------------------------------------------------
  # SO_R013: Initialization Imports Only
  # ----------------------------------------------------------
  - id: SO_R013
    type: rule
    name: initialization_imports_only
    display_name: "Initialization Imports Only"
    one_liner: "Initialization files only import and configure; no function definitions"
    file_path: "CH01_structure_organization/rules/SO_R013_initialization_imports_only.qmd"

    rule_natural: |
      Initialization files (sc_initialization_*.R) must only do:
      Import libraries, source utility files, set environment variables, initialize resources.
      Initialization files must NOT define new functions or business logic.
      All functions must be in dedicated fn_*.R files.
      This prevents duplicate function definitions and hidden dependencies.

    rule_formal: |
      RULE SO_R013_CHECK:
      FOR ALL file F:
      IF filename(F) MATCHES "sc_initialization_*.R"
      OR filename(F) MATCHES "*_initialization_*.R"
      THEN contains_function_definitions(F) EQUALS FALSE
      AND purpose(F) IN ["import", "configure", "source"]

    applies_to:
      - initialization_scripts
      - project_setup
      - code_organization

    requires:
      - SO_R007  # One function one file

    violations:
      - "Defining dbConnect_from_list() inside initialization file"
      - "Adding helper functions to sc_initialization_update_mode.R"
      - "Business logic in initialization scripts"

    compliant:
      - "Initialization only sources fn_*.R files"
      - "All functions in dedicated files under global_scripts/"
      - "Initialization sets environment variables and loads packages"

  # ----------------------------------------------------------
  # DM_R041: ETL Directory Structure
  # ----------------------------------------------------------
  - id: DM_R041
    type: rule
    name: etl_directory_structure
    display_name: "ETL Directory Structure"
    one_liner: "All ETL/DRV scripts must be in mandatory hierarchical directory structure"
    file_path: "CH02_data_management/rules/DM_R041_etl_directory_structure.qmd"

    rule_natural: |
      No ETL or DRV scripts may exist in the root update_scripts directory.
      ETL scripts must be in ETL/{platform}/ directories.
      DRV scripts must be in DRV/{platform}/ directories.
      Orchestration scripts must be in orchestration/ directory.
      Each platform (cbz, amz, eby) has its own subdirectory.

    rule_formal: |
      RULE DM_R041_NO_ROOT:
      FOR ALL script S:
      IF is_etl_script(S) OR is_drv_script(S)
      THEN NOT in_directory(S, "update_scripts/")

      RULE DM_R041_ETL_LOCATION:
      FOR ALL script S:
      IF filename(S) MATCHES "*_ETL_*"
      THEN in_directory(S, "ETL/{platform}/")

      RULE DM_R041_DRV_LOCATION:
      FOR ALL script S:
      IF filename(S) MATCHES "*_DRV*" OR filename(S) MATCHES "*_D[0-9]*"
      THEN in_directory(S, "DRV/{platform}/")

    applies_to:
      - etl_development
      - project_organization
      - data_pipeline

    requires:
      - MP064  # ETL-Derivation separation
      - MP108  # ETL phase sequence

    violations:
      - "cbz_ETL_sales_0IM.R in update_scripts/ root"
      - "amz_DRV01_customer.R in update_scripts/ root"
      - "ETL script without platform subdirectory"

    compliant:
      - "ETL/cbz/cbz_ETL_sales_0IM.R"
      - "DRV/amz/amz_DRV01_customer.R"
      - "orchestration/run_full_pipeline.R"

  # ----------------------------------------------------------
  # DEV_R001: Apply Functions Over Loops
  # ----------------------------------------------------------
  - id: DEV_R001
    type: rule
    name: apply_over_loops
    display_name: "Apply Over Loops"
    one_liner: "Use lapply() and apply family functions instead of explicit for loops"
    file_path: "CH03_development_methodology/rules/DEV_R001_apply_over_loops.qmd"

    rule_natural: |
      When iterating over data structures in R,
      prefer lapply(), sapply(), vapply(), mapply() over for loops.
      This follows R's functional and vectorized programming paradigm.
      Use for loops only when: complex state management, early termination needed,
      or explicit index access required.

    rule_formal: |
      RULE DEV_R001_CHECK:
      FOR ALL code_block C:
      IF has_iteration(C)
      AND NOT needs_state_management(C)
      AND NOT needs_early_termination(C)
      THEN uses_apply_family(C)
      AND NOT uses_for_loop(C)

    applies_to:
      - r_development
      - data_processing
      - refactoring

    violations:
      - "result <- c(); for(i in 1:n) result <- c(result, f(i))"
      - "Using for loop to transform each element of a list"
      - "Growing vectors inside loops"

    compliant:
      - "result <- lapply(items, transform_function)"
      - "result <- sapply(values, function(x) if(x > 0) x else 0)"
      - "vapply(list_of_vectors, mean, numeric(1))"

  # ----------------------------------------------------------
  # DEV_P001: Debug Principles
  # ----------------------------------------------------------
  - id: DEV_P001
    type: principle
    name: debug_principles
    display_name: "Debug Principles"
    one_liner: "Debugging requires visibility, isolation, reproducibility, and documentation"
    file_path: "CH03_development_methodology/principles/DEV_P001_debug_principles.qmd"

    rule_natural: |
      Debugging must be systematic.
      Visibility: Use consistent logging with levels (ERROR, WARN, INFO, DEBUG).
      Isolation: Test components at boundaries; use mocking.
      Reproducibility: Control random seeds; capture environment context.
      Documentation: Document issues, steps to reproduce, root cause, and resolution.

    rule_formal: |
      RULE DEV_P001_VISIBILITY:
      FOR ALL function F:
      IF is_complex(F)
      THEN has_logging(F)
      AND logging_includes(F, ["entry", "exit", "errors"])

      RULE DEV_P001_DOCUMENTATION:
      FOR ALL bug_fix B:
      has_documentation(B, "issue_statement")
      AND has_documentation(B, "reproduction_steps")
      AND has_documentation(B, "root_cause")
      AND has_documentation(B, "resolution")

    applies_to:
      - debugging
      - troubleshooting
      - development_methodology

    violations:
      - "No logging in complex data processing functions"
      - "Fixing bug without documenting root cause"
      - "Cannot reproduce issue due to missing context"

    compliant:
      - "Functions have log_debug() calls at key points"
      - "Bug fixes include CHANGELOG entry with root cause"
      - "Test cases capture reproduction steps"

