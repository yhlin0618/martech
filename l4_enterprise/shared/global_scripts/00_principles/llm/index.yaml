# ========================================
# MAMBA Principles Index (LLM-Friendly Format)
# Version: 5.3
# Last Updated: 2026-02-11
#
# THIS IS THE MAIN ENTRY POINT FOR LLM AGENTS
#
# Architecture:
#   llm/
#   ├── index.yaml              ← You are here (quick reference + scenarios)
#   │
#   │ ── PART 1: PRINCIPLES (What/Why) ──
#   ├── CH00_meta.yaml          ← ALL MP Principles (~124) ⭐ MANDATORY
#   ├── CH01_structure.yaml     ← SO_P, SO_R Principles (49)
#   ├── CH02_data.yaml          ← DM_P, DM_R Principles (63)
#   ├── CH03_development.yaml   ← DEV_P, DEV_R Principles (57)
#   ├── CH04_ui.yaml            ← UI_P, UI_R Principles (32)
#   ├── CH05_testing.yaml       ← TD_P, TD_R Principles (9)
#   ├── CH06_ic.yaml            ← Integration and collaboration
#   ├── CH07_ux.yaml            ← UX_P Principles (2)
#   ├── CH08_data_presentation.yaml ← DP_R Data Presentation (1+)
#   ├── CH19_documentation.yaml    ← DOC_P, DOC_R Documentation (5)
#   │
#   │ ── PART 2: IMPLEMENTATIONS (How) ──
#   ├── CH09_database.yaml      ← Database specifications
#   ├── CH11_etl.yaml           ← ETL pipeline implementations
#   ├── CH12_derivations.yaml   ← Business Derivations
#   ├── CH13_modules.yaml       ← Utility modules
#   ├── CH14_functions.yaml     ← Functions Reference
#   ├── CH15_apis.yaml          ← API integration
#   ├── CH16_connections.yaml   ← Component Connections
#   ├── CH17_templates.yaml     ← Templates & Examples
#   └── CH18_solutions.yaml     ← Solution patterns
#
# Counts change as the documentation set evolves; prefer the chapter files over
# hard-coded totals in human-facing docs.
#
# LLM Reading Flow:
#   1. Read this index.yaml first (quick scenarios reference)
#   2. ⭐ MANDATORY: Read CH00_meta.yaml (foundational principles)
#   3. Based on task, read additional chapter files:
#      - ETL work?      → Read CH02_data.yaml + CH11_etl.yaml
#      - UI work?       → Read CH04_ui.yaml
#      - UX / perf?     → Read CH07_ux.yaml
#      - Charts/tables? → Read CH08_data_presentation.yaml
#      - Debugging?     → Read CH03_development.yaml + CH18_solutions.yaml
#      - API work?      → Read CH15_apis.yaml
#      - Database?      → Read CH09_database.yaml
#      - Wiki/docs?     → Read CH19_documentation.yaml
#   4. Part 2 chapters provide HOW-TO implementations for Part 1 principles
#
# ========================================

