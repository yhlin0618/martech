  # Unit Suffix Column Naming - DM_R057 ensures unit clarity
  DM_R057_unit_suffix_column_naming:
    category: rule
    affects: ALL_COLUMN_NAMING
    implements:
      - P0005_naming_principles
    complements:
      - DM_R025_type_conversion_r_duckdb
      - DM_R016_lowercase_natural_key
    extends:
      - SO_R002_file_naming_convention
    rationale: |
      Establishes the standard for including unit suffixes in column names when
      the column value represents a quantity with a specific unit. This is
      particularly critical for difftime conversions where the default "auto"
      units can produce different results depending on the time span. The suffix
      makes the unit explicit and prevents data interpretation errors.
      
  # Console Output Transparency - Critical for AI debugging
  # NOTE: MP106 → DEV_P022, MP053 → DM_P007 (reclassified 2026-02-28)
  DEV_P022_console_output_transparency:
    category: principle
    affects: ALL_FUNCTIONS_AND_SCRIPTS
    extends:
      - DM_P007_information_flow_transparency
      - MP046_debug_code_tracing
    supports:
      - DEV_P013_error_handling_patterns
      - MP099_realtime_progress_reporting
    complements:
      - MP050_root_cause_resolution
      - MP095_claude_code_driven_changes
    technical_foundation_for:
      - AI-assisted debugging workflows
      - Error diagnosis and resolution
      - Program execution transparency
      - Development productivity
    rationale: |
      Establishes console output transparency as a fundamental requirement for all
      program execution. This meta-principle ensures that:
      - All errors remain visible and are never suppressed by error handling
      - Program state changes are observable through console output
      - AI debugging tools have access to complete execution context
      - Silent failures are eliminated from the codebase
      - Real-time progress is reported for long-running operations
      This principle directly addresses the critical debugging challenges where
      hidden errors make AI-assisted development nearly impossible.
    implementation_requirements:
      - No silent error suppression (no try(..., silent = TRUE))
      - No output redirection to null (no capture.output(..., file = nullfile()))
      - Transparent error handling with full context logging
      - Progress reporting for operations over 5 seconds
      - Structured output patterns for AI parsing
      - Error context preservation in all exception handlers 