# ========================================
# CH03: Development Methodology Principles
# Version: 1.1
# Last Updated: 2025-12-27
#
# Contains: DEV_P001-DEV_P022 (22 principles) + DEV_R001-DEV_R039,DEV_R050-DEV_R053,DEV_R055 (44 rules)
# Total: 65 principles
# ========================================

chapter: "CH03_development"
description: "Development Methodology Principles and Rules"
principle_count: 60

principles:

  # ====================
  # DEV_P PRINCIPLES (21)
  # ====================

  - id: DEV_P001
    type: principle
    name: debug_principles
    display_name: "Debug Principles"
    one_liner: "Systematic approach to debugging and issue resolution"
    file_path: "CH03_development_methodology/principles/DEV_P001_debug_principles.qmd"

    rule_natural: |
      Debugging must follow systematic approach:
      - Reproduce the issue first
      - Isolate the component causing issue
      - Add strategic logging
      - Test fix in isolation
      - Document root cause and solution

    rule_formal: |
      RULE DEV_P001_DEBUG:
      debug_process = [
        reproduce_issue,
        isolate_component,
        add_logging,
        test_fix,
        document_solution
      ]

    violations:
      - "Random code changes without understanding"
      - "Fixing symptoms instead of root cause"
    compliant:
      - "Systematic isolation and targeted fix"
      - "Issue documented in CHANGELOG"

  - id: DEV_P002
    type: principle
    name: authentic_context_testing
    display_name: "Authentic Context Testing"
    one_liner: "Test in realistic environments, not simplified mocks"
    file_path: "CH03_development_methodology/principles/DEV_P002_authentic_context_testing.qmd"

    rule_natural: |
      Tests should use authentic context:
      - Real database connections when possible
      - Actual data subsets, not synthetic
      - Production-like configurations
      - Full component integration

    rule_formal: |
      RULE DEV_P002_AUTHENTIC:
      FOR ALL test T:
      uses_real_connections(T) OR uses_realistic_mock(T)
      AND NOT uses_trivial_synthetic_data(T)

    violations:
      - "Testing with empty mock database"
      - "Hard-coded test values"
    compliant:
      - "Test with sample of production data"
      - "Integration test with actual dependencies"

  - id: DEV_P003
    type: principle
    name: similar_functionality_management
    display_name: "Similar Functionality Management"
    one_liner: "Identify and consolidate similar code patterns"
    file_path: "CH03_development_methodology/principles/DEV_P003_similar_functionality_management.qmd"

    rule_natural: |
      When similar code exists:
      - Identify common patterns
      - Extract to shared function
      - Parameterize differences
      - Document variants and use cases

    rule_formal: |
      RULE DEV_P003_SIMILAR:
      IF similar_code(A, B) > threshold
      THEN extract_common_function(A, B)
      AND parameterize_differences()

    violations:
      - "Copy-paste code across files"
      - "Multiple functions doing same thing"
    compliant:
      - "Single parameterized function"
      - "Documented variants"

  - id: DEV_P004
    type: principle
    name: dot_notation_property_access
    display_name: "Dot Notation Property Access"
    one_liner: "Use $ for property access, [[ ]] for dynamic access"
    file_path: "CH03_development_methodology/principles/DEV_P004_dot_notation_property_access.qmd"

    rule_natural: |
      Property access conventions in R:
      - Use $ for known column names
      - Use [[ ]] for dynamic/variable names
      - Use [ ] for multiple columns
      - Be consistent within file

    rule_formal: |
      RULE DEV_P004_DOT:
      IF column_name is literal THEN use_dollar(df$col)
      IF column_name is variable THEN use_bracket(df[[var]])

    violations:
      - "df[[\"known_column\"]] when $ would work"
      - "Inconsistent access patterns"
    compliant:
      - "df$customer_id for known column"
      - "df[[col_name]] for variable"

  - id: DEV_P005
    type: principle
    name: debug_efficiency_exception
    display_name: "Debug Efficiency Exception"
    one_liner: "During debugging, efficiency rules may be relaxed"
    file_path: "CH03_development_methodology/principles/DEV_P005_debug_efficiency_exception.qmd"

    rule_natural: |
      During active debugging:
      - Efficiency optimizations may be skipped
      - Clarity over performance
      - Extra logging acceptable
      - Clean up after issue resolved

    rule_formal: |
      RULE DEV_P005_DEBUG_EXCEPTION:
      DURING debugging_phase:
      relax(efficiency_rules)
      prioritize(clarity, logging)
      AFTER resolution: cleanup()

    violations:
      - "Leaving debug code in production"
    compliant:
      - "Verbose logging during debug, removed after"

  - id: DEV_P006
    type: principle
    name: case_sensitivity
    display_name: "Case Sensitivity"
    one_liner: "Handle case sensitivity consistently across systems"
    file_path: "CH03_development_methodology/principles/DEV_P006_case_sensitivity.qmd"

    rule_natural: |
      Case handling must be consistent:
      - File names: lowercase with underscores
      - Variable names: snake_case
      - R is case-sensitive: be careful
      - Database columns: lowercase

    rule_formal: |
      RULE DEV_P006_CASE:
      filenames = lowercase_with_underscore
      variables = snake_case
      db_columns = lowercase

    violations:
      - "MyFile.R instead of my_file.R"
      - "customerID instead of customer_id"
    compliant:
      - "fn_calculate_rfm.R"
      - "customer_id, order_date"

  - id: DEV_P007
    type: principle
    name: initialization_assumption
    display_name: "Initialization Assumption"
    one_liner: "Code can assume initialization has completed"
    file_path: "CH03_development_methodology/principles/DEV_P007_initialization_assumption.qmd"

    rule_natural: |
      After initialization phase:
      - Global configuration available
      - Database connections ready
      - Utility functions sourced
      - No need to re-check

    rule_formal: |
      RULE DEV_P007_INIT:
      AFTER initialization:
      assume_available(global_config)
      assume_available(db_connections)
      assume_available(utility_functions)

    violations:
      - "Re-sourcing already loaded files"
      - "Re-checking already validated config"
    compliant:
      - "Direct use of initialized resources"

  - id: DEV_P008
    type: principle
    name: no_uninitialized_exceptions
    display_name: "No Uninitialized Exceptions"
    one_liner: "Never catch exceptions for uninitialized variables"
    file_path: "CH03_development_methodology/principles/DEV_P008_no_uninitialized_exceptions.qmd"

    rule_natural: |
      Uninitialized variables are errors:
      - Don't use tryCatch for missing vars
      - Initialize all variables before use
      - Use stopifnot for preconditions
      - Fix the initialization, not the error

    rule_formal: |
      RULE DEV_P008_NO_UNINIT:
      FOR ALL variable V:
      initialize_before_use(V)
      AND NOT tryCatch(V_when_missing)

    violations:
      - "tryCatch around possibly undefined var"
      - "Silently defaulting missing var"
    compliant:
      - "Explicit initialization at start"

  - id: DEV_P009
    type: principle
    name: exception_as_rule
    display_name: "Exception as Rule"
    one_liner: "Handle common exceptions as part of normal flow"
    file_path: "CH03_development_methodology/principles/DEV_P009_exception_as_rule.qmd"

    rule_natural: |
      Common error conditions handled explicitly:
      - Empty data sets
      - Missing columns
      - NULL values
      - Connection failures
      - Check first, don't catch

    rule_formal: |
      RULE DEV_P009_EXCEPTION:
      FOR common_error_condition C:
      IF likely(C) THEN check_before_action(C)
      AND NOT rely_on_exception_handling(C)

    violations:
      - "try() around every database call"
      - "Catching expected empty results"
    compliant:
      - "if(nrow(df) == 0) return(empty_result)"

  - id: DEV_P010
    type: principle
    name: reactive_access_safety
    display_name: "Reactive Access Safety"
    one_liner: "Access reactive values safely in Shiny"
    file_path: "CH03_development_methodology/principles/DEV_P010_reactive_access_safety.qmd"

    rule_natural: |
      Reactive values in Shiny:
      - Only access inside reactive context
      - Use req() for required inputs
      - isolate() for non-reactive reads
      - Validate before use

    rule_formal: |
      RULE DEV_P010_REACTIVE:
      FOR ALL reactive_access R:
      in_reactive_context(R)
      AND use_req_for_required(R)

    violations:
      - "Accessing input$ outside reactive"
      - "Missing req() for user inputs"
    compliant:
      - "observe({ req(input$x); ... })"

  - id: DEV_P011
    type: principle
    name: reactive_requirement_validation
    display_name: "Reactive Requirement Validation"
    one_liner: "Validate reactive requirements before processing"
    file_path: "CH03_development_methodology/principles/DEV_P011_reactive_requirement_validation.qmd"

    rule_natural: |
      Before processing in reactive:
      - req() for required inputs
      - Validate data types
      - Check data not empty
      - Return NULL for invalid state

    rule_formal: |
      RULE DEV_P011_VALIDATE:
      reactive_block = {
        req(required_inputs),
        validate_types(),
        check_not_empty(),
        process()
      }

    violations:
      - "Processing NULL inputs"
      - "Missing validation steps"
    compliant:
      - "req(input$data); validate(nrow(data()) > 0)"

  - id: DEV_P012
    type: principle
    name: reactive_data_filtering
    display_name: "Reactive Data Filtering"
    one_liner: "Filter data reactively based on user inputs"
    file_path: "CH03_development_methodology/principles/DEV_P012_reactive_data_filtering.qmd"

    rule_natural: |
      Data filtering in Shiny:
      - Create base reactive for full data
      - Create filtered reactive dependent on inputs
      - Use debounce for frequent inputs
      - Cache when appropriate

    rule_formal: |
      RULE DEV_P012_FILTER:
      filtered_data = reactive({
        base_data() %>% filter_by(inputs())
      })

    violations:
      - "Filtering in render function"
      - "Re-querying database on each filter"
    compliant:
      - "Separate reactive for filtered data"

  - id: DEV_P013
    type: principle
    name: error_handling_patterns
    display_name: "Error Handling Patterns"
    one_liner: "Use consistent error handling patterns"
    file_path: "CH03_development_methodology/principles/DEV_P013_error_handling_patterns.qmd"

    rule_natural: |
      Error handling conventions:
      - Use tryCatch for external calls
      - Provide informative error messages
      - Log errors with context
      - Fail fast for programming errors

    rule_formal: |
      RULE DEV_P013_ERROR:
      FOR external_call:
        tryCatch(call, error = log_and_handle)
      FOR programming_error:
        stopifnot(preconditions)

    violations:
      - "Silent error swallowing"
      - "Generic error messages"
    compliant:
      - "Specific error message with context"

  - id: DEV_P014
    type: principle
    name: performance_optimization
    display_name: "Performance Optimization"
    one_liner: "Optimize after measuring, not prematurely"
    file_path: "CH03_development_methodology/principles/DEV_P014_performance_optimization.qmd"

    rule_natural: |
      Performance optimization approach:
      - First make it correct
      - Then measure performance
      - Optimize bottlenecks only
      - Document optimizations

    rule_formal: |
      RULE DEV_P014_PERF:
      optimization_process = [
        implement_correctly,
        measure_performance,
        identify_bottlenecks,
        optimize_measured_issues
      ]

    violations:
      - "Premature optimization"
      - "Optimizing without measuring"
    compliant:
      - "Profiling before optimization"

  - id: DEV_P015
    type: principle
    name: state_management
    display_name: "State Management"
    one_liner: "Manage application state explicitly"
    file_path: "CH03_development_methodology/principles/DEV_P015_state_management.qmd"

    rule_natural: |
      State management in applications:
      - Use reactiveValues for mutable state
      - Avoid global variables
      - Document state dependencies
      - Clear state transitions

    rule_formal: |
      RULE DEV_P015_STATE:
      app_state = reactiveValues()
      NOT global_variables
      document_state_flow()

    violations:
      - "Global variables for state"
      - "Undocumented state changes"
    compliant:
      - "reactiveValues() for all mutable state"

  - id: DEV_P016
    type: principle
    name: tidyverse_shiny_terminology_alignment
    display_name: "Tidyverse/Shiny Terminology Alignment"
    one_liner: "Use consistent terminology from tidyverse and Shiny"
    file_path: "CH03_development_methodology/principles/DEV_P016_tidyverse_shiny_terminology_alignment.qmd"

    rule_natural: |
      Use standard terminology:
      - tibble not data.frame
      - filter not subset
      - mutate not transform
      - reactive not callback

    rule_formal: |
      RULE DEV_P016_TERMS:
      preferred_terms = {
        tibble > data.frame,
        filter > subset,
        mutate > transform,
        reactive > callback
      }

    violations:
      - "Using 'subset' in dplyr chains"
      - "Calling reactives 'callbacks'"
    compliant:
      - "Consistent tidyverse terminology"

  - id: DEV_P017
    type: principle
    name: dataframe_column_access
    display_name: "DataFrame Column Access"
    one_liner: "Access data frame columns consistently"
    file_path: "CH03_development_methodology/principles/DEV_P017_dataframe_column_access.qmd"

    rule_natural: |
      Column access patterns:
      - Use pull() for extracting single column as vector
      - Use select() for subsetting columns
      - Use $col for direct access in base R
      - Avoid mixing patterns

    rule_formal: |
      RULE DEV_P017_ACCESS:
      single_column_vector = pull(df, col)
      column_subset = select(df, cols)
      direct_access = df$col

    violations:
      - "df[,'col'] when pull() clearer"
      - "Inconsistent access patterns"
    compliant:
      - "df %>% pull(col) for vector"

  - id: DEV_P018
    type: principle
    name: defensive_error_handling
    display_name: "Defensive Error Handling"
    one_liner: "Anticipate and handle potential errors"
    file_path: "CH03_development_methodology/principles/DEV_P018_defensive_error_handling.qmd"

    rule_natural: |
      Defensive programming:
      - Validate inputs at boundaries
      - Check for NULL and NA
      - Provide sensible defaults
      - Fail gracefully with helpful messages

    rule_formal: |
      RULE DEV_P018_DEFENSIVE:
      at_boundary:
        validate_inputs()
        check_nulls()
        provide_defaults()
        handle_gracefully()

    violations:
      - "Assuming inputs are always valid"
      - "Cryptic error messages"
    compliant:
      - "Input validation with clear errors"

  - id: DEV_P019
    type: principle
    name: consistent_component_state
    display_name: "Consistent Component State"
    one_liner: "Maintain consistent state across component lifecycle"
    file_path: "CH03_development_methodology/principles/DEV_P019_consistent_component_state.qmd"

    rule_natural: |
      Component state management:
      - Initialize in consistent state
      - Update state atomically
      - Validate state after updates
      - Handle invalid states gracefully

    rule_formal: |
      RULE DEV_P019_CONSISTENT:
      component_lifecycle = [
        initialize_valid_state,
        update_atomically,
        validate_post_update,
        handle_invalid_gracefully
      ]

    violations:
      - "Partial state updates"
      - "Unchecked invalid states"
    compliant:
      - "Atomic state transitions with validation"

  - id: DEV_P020
    type: principle
    name: minimal_example_construction
    display_name: "Minimal Example Construction"
    one_liner: "Create minimal examples to isolate issues"
    file_path: "CH03_development_methodology/principles/DEV_P020_minimal_example_construction.qmd"

    rule_natural: |
      For debugging and testing:
      - Create minimal reproducing example
      - Remove unnecessary dependencies
      - Use smallest data that shows issue
      - Document example for future reference

    rule_formal: |
      RULE DEV_P020_MINIMAL:
      minimal_example = {
        smallest_code_showing_issue,
        minimal_data,
        documented_reproduction_steps
      }

    violations:
      - "Debugging in full application"
      - "Large test cases"
    compliant:
      - "Isolated minimal test case"

  - id: DEV_P021
    type: principle
    name: performance_acceleration
    display_name: "Performance Acceleration"
    one_liner: "Apply proven acceleration techniques"
    file_path: "CH03_development_methodology/principles/DEV_P021_performance_acceleration.qmd"

    rule_natural: |
      Performance acceleration techniques:
      - Vectorization over loops
      - Database-side aggregation
      - Caching of expensive computations
      - Lazy evaluation where appropriate

    rule_formal: |
      RULE DEV_P021_ACCEL:
      acceleration_techniques = [
        vectorization,
        db_aggregation,
        caching,
        lazy_evaluation
      ]

    violations:
      - "For loops for vectorizable operations"
      - "R-side aggregation of large data"
    compliant:
      - "Vectorized operations"
      - "SQL aggregation"

  - id: DEV_P022
    type: principle
    parent: MP150  # Transparency Principle
    name: console_output_transparency
    display_name: "Console Output Transparency"
    one_liner: "Make console output informative"
    file_path: "CH03_development_methodology/principles/DEV_P022_console_output_transparency.qmd"
    migrated_from: MP106  # Reclassified from meta-principle to principle (2026-02-28)

    rule_natural: |
      Console output:
      - Progress indicators
      - Status messages
      - Error details
      - Completion confirmation
      - Realtime validation/audit warnings for non-OK conditions
      - Persist structured audit output under output/ for traceability
      - Apply retention cleanup for timestamped reports

    rule_formal: |
      RULE DEV_P022_CONSOLE:
      console_output includes:
        progress
        status
        errors
        completion
        realtime_validation_warnings
      AND persist_audit_output(output/)
      AND enforce_output_retention_cleanup

    violations:
      - "Silent execution"
      - "No progress indication"
      - "Only console logs without persisted audit output"
    compliant:
      - "Informative console output"
      - "Realtime log + output/etl_validation/*.csv with retention"

  # ====================
  # DEV_R RULES (36)
  # ====================

  - id: DEV_R001
    type: rule
    name: apply_over_loops
    display_name: "Apply Over Loops"
    one_liner: "Use apply family functions instead of for loops"
    file_path: "CH03_development_methodology/rules/DEV_R001_apply_over_loops.qmd"

    rule_natural: |
      Replace for loops with apply functions:
      - lapply() for list operations
      - sapply() when simplified output needed
      - map() from purrr for consistency
      - vapply() for type safety

    rule_formal: |
      RULE DEV_R001_APPLY:
      REPLACE for_loop WITH apply_family
      lapply(list, fn) > for(x in list) fn(x)

    violations:
      - "for (i in 1:n) { result[i] <- fn(x[i]) }"
    compliant:
      - "lapply(x, fn)"
      - "map(x, fn)"

  - id: DEV_R002
    type: rule
    name: functional_encapsulation
    display_name: "Functional Encapsulation"
    one_liner: "Encapsulate logic in well-defined functions"
    file_path: "CH03_development_methodology/rules/DEV_R002_functional_encapsulation.qmd"

    rule_natural: |
      Code organization through functions:
      - Each function does one thing
      - Clear inputs and outputs
      - No side effects when possible
      - Document with roxygen2

    rule_formal: |
      RULE DEV_R002_FUNC:
      FOR ALL function F:
      single_purpose(F)
      AND clear_interface(F)
      AND minimal_side_effects(F)

    violations:
      - "Long scripts without functions"
      - "Functions with multiple responsibilities"
    compliant:
      - "Single-purpose documented functions"

  - id: DEV_R003
    type: rule
    name: platform_neutral_code
    display_name: "Platform Neutral Code"
    one_liner: "Write code that works across platforms"
    file_path: "CH03_development_methodology/rules/DEV_R003_platform_neutral_code.qmd"

    rule_natural: |
      Platform-neutral code practices:
      - Use file.path() for paths
      - Avoid hard-coded paths
      - Use normalizePath() when needed
      - Test on multiple platforms

    rule_formal: |
      RULE DEV_R003_NEUTRAL:
      path_construction = file.path()
      NOT hard_coded_separator
      NOT platform_specific_paths

    violations:
      - "paste('dir', 'file', sep='/')"
      - "Hard-coded Windows paths"
    compliant:
      - "file.path('dir', 'file')"

  - id: DEV_R004
    type: rule
    name: recursive_sourcing
    display_name: "Recursive Sourcing"
    one_liner: "Source directories recursively, not individual files"
    file_path: "CH03_development_methodology/rules/DEV_R004_recursive_sourcing.qmd"

    rule_natural: |
      Source entire directories:
      - Use recursive sourcing for directories
      - Avoid listing individual files
      - Use naming conventions for order
      - Document sourcing patterns

    rule_formal: |
      RULE DEV_R004_RECURSIVE:
      source_pattern = source_directory(dir, recursive = TRUE)
      NOT source_individual_files_list

    violations:
      - "source('fn1.R'); source('fn2.R'); ..."
    compliant:
      - "lapply(list.files(dir, '\\.R$'), source)"

  - id: DEV_R005
    type: rule
    name: ai_locked_files
    display_name: "AI Locked Files"
    one_liner: "Mark files that AI should not modify"
    file_path: "CH03_development_methodology/rules/DEV_R005_ai_locked_files.qmd"

    rule_natural: |
      Some files should not be AI-modified:
      - Mark with @AI_LOCKED comment
      - Document reason for lock
      - Human review required for changes
      - Used for critical configurations

    rule_formal: |
      RULE DEV_R005_LOCKED:
      IF file_has_comment("@AI_LOCKED")
      THEN ai_cannot_modify(file)

    violations:
      - "AI modifying locked files"
    compliant:
      - "# @AI_LOCKED: Critical configuration"

  - id: DEV_R006
    type: rule
    name: package_documentation_reference
    display_name: "Package Documentation Reference"
    one_liner: "Reference package documentation for function usage"
    file_path: "CH03_development_methodology/rules/DEV_R006_package_documentation_reference.qmd"

    rule_natural: |
      When using package functions:
      - Check official documentation
      - Use ?function for help
      - Follow package conventions
      - Note version dependencies

    rule_formal: |
      RULE DEV_R006_DOC:
      BEFORE using package_function:
      consult_documentation()
      follow_conventions()

    violations:
      - "Guessing function parameters"
      - "Ignoring deprecation warnings"
    compliant:
      - "Documentation-confirmed usage"

  - id: DEV_R007
    type: rule
    name: package_function_reference
    display_name: "Package Function Reference"
    one_liner: "Use package::function for clarity"
    file_path: "CH03_development_methodology/rules/DEV_R007_package_function_reference.qmd"

    rule_natural: |
      Explicit package references:
      - Use pkg::fn() for non-obvious functions
      - Avoid name conflicts
      - Clearer dependency tracking
      - Exception: common tidyverse functions

    rule_formal: |
      RULE DEV_R007_PKG_REF:
      IF function_name is ambiguous
      THEN use package::function()

    violations:
      - "Ambiguous function without package"
    compliant:
      - "dplyr::filter() when needed"
      - "jsonlite::toJSON()"

  - id: DEV_R008
    type: rule
    name: minimal_modification
    display_name: "Minimal Modification"
    one_liner: "Make smallest possible changes to fix issues"
    file_path: "CH03_development_methodology/rules/DEV_R008_minimal_modification.qmd"

    rule_natural: |
      When fixing issues:
      - Change only what's necessary
      - Avoid scope creep
      - One issue per change
      - Document the change

    rule_formal: |
      RULE DEV_R008_MINIMAL:
      fix_scope = minimal_necessary_changes
      NOT refactoring_while_fixing
      ONE issue_per_commit

    violations:
      - "Reformatting unrelated code"
      - "Multiple issues in one fix"
    compliant:
      - "Targeted minimal fix"

  - id: DEV_R009
    type: rule
    name: initialization_sourcing
    display_name: "Initialization Sourcing"
    one_liner: "Source initialization files at correct time"
    file_path: "CH03_development_methodology/rules/DEV_R009_initialization_sourcing.qmd"

    rule_natural: |
      Initialization order matters:
      - Source init files first
      - Dependencies before dependents
      - Configuration before functions
      - Document init requirements

    rule_formal: |
      RULE DEV_R009_INIT_SOURCE:
      source_order = [
        configuration,
        database_setup,
        utility_functions,
        business_logic
      ]

    violations:
      - "Using functions before sourcing"
      - "Random sourcing order"
    compliant:
      - "Documented init sequence"

  - id: DEV_R010
    type: rule
    name: ai_parameter_modification
    display_name: "AI Parameter Modification"
    one_liner: "AI should document parameter changes clearly"
    file_path: "CH03_development_methodology/rules/DEV_R010_ai_parameter_modification.qmd"

    rule_natural: |
      When AI modifies parameters:
      - Document the change
      - Explain rationale
      - Preserve original as comment
      - Flag for human review

