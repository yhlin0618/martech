      - "cbz_D01_03.R calls run_D01_03(platform_id = 'cbz')"
      - "Wrapper is ~60 lines with proper header"

  - id: DEV_R039
    type: rule
    name: trace_before_modify
    display_name: "Trace Before Modify"
    one_liner: "Trace actual code path before modifying files"
    file_path: "CH03_development_methodology/rules/DEV_R039_trace_before_modify.qmd"
    derived_from: MP029  # No Fake Information - files/paths aspect

    rule_natural: |
      Before modifying any module or file:
      1. Search for actual source() or import statements
      2. Verify which file is ACTUALLY being used
      3. Do not assume based on file name or directory alone
      4. Trace the full dependency chain if needed

      This is an instance of MP029 (No Fake Information):
      Don't assume a file is being used - trace and verify first.

      Real case: Modifying module_login.R when app_*.R actually
      sources module_login_supabase.R - wasted multiple iterations.

    rule_formal: |
      RULE DEV_R039_TRACE:
      BEFORE modify_file(F):
      trace_usage(F) -> actual_files
      grep("source.*{F.name}", app_files)
      verify(F IN actual_files)
      IF NOT found THEN search_alternatives()

    verification_commands:
      - "grep -r 'source.*module_name' *.R"
      - "grep -r 'import module_name' *.py"
      - "Check app initialization for actual source() paths"

    violations:
      - "Modifying module_login.R when app uses module_login_supabase.R"
      - "Changing config file without verifying it's being loaded"
      - "Assuming file is used based on file name or location"
    compliant:
      - "grep 'source.*module_login' app_*.R → found supabase version"
      - "Trace app_*.R source() chain before modifying"
      - "Verify config loading path in app initialization"

  - id: DEV_R052
    type: rule
    name: canonical_english_keys
    display_name: "Canonical English Keys"
    one_liner: "Business logic uses English keys; only the UI layer translates for display"
    file_path: "CH03_development_methodology/rules/DEV_R052_canonical_english_keys.qmd"
    derived_from: MP029  # No Fake Information - prevents encoding mismatches

    rule_natural: |
      All non-UI code must use canonical English strings:
      1. Database labels (r_label, f_label, etc.) → English values
      2. switch/case_when/if-else logic → match English keys
      3. Configuration files → English identifiers
      4. translate() is called ONLY at UI rendering (renderUI, renderPlotly, etc.)

      UI rendering MUST use translate() — never display raw English keys to users.

      This prevents silent switch fall-through bugs when business logic
      matches Chinese unicode escapes that differ from stored English labels.

    rule_formal: |
      RULE DEV_R052_CANONICAL:
      FOR ALL label_columns IN database:
        value(label_column) MUST BE English
      FOR ALL switch_cases IN business_logic:
        match_key MUST BE English
      FOR ALL ui_output IN renderUI/renderPlotly/renderDataTable:
        display_text = translate(english_key)
      INVARIANT: translate() NOT called outside UI rendering layer

    violations:
      - "switch on Chinese unicode escapes in business logic"
      - "Storing Chinese labels in DRV output columns"
      - "Band-aid mapping English→Chinese before feeding into Chinese-only switch"
      - "Displaying raw English keys in UI without translate()"
    compliant:
      - "DRV stores 'Recent Buyer', switch matches 'Recent Buyer'"
      - "renderUI calls translate('Recent Buyer') for display"
      - "ui_terminology.csv has entry for every English key"

  - id: DEV_R053
    type: rule
    name: ai_prompt_localization
    display_name: "AI Prompt Localization"
    one_liner: "AI prompts use locale-aware ai_prompts.yaml, not translate()/ui_terminology.csv"
    file_path: "CH03_development_methodology/rules/DEV_R053_ai_prompt_localization.qmd"
    derived_from: DEV_R052  # Extends canonical English keys with AI-specific locale handling

    rule_natural: |
      AI prompts (system_prompt, user_prompt_template) require LOCALIZATION, not TRANSLATION.
      Translation = one English key maps to one short translated string (word/phrase level).
      Localization = same function has structurally different versions per locale (paragraph level).

      Two mechanisms, two content types:

      1. UI labels (short, word/phrase level):
         - Mechanism: translate() + ui_terminology.csv
         - Example: "Customer Count" -> "顧客數"
         - Rule: DEV_R052 governs this boundary

      2. AI prompts (long, paragraph level with template vars):
         - Mechanism: load_openai_prompt(key, locale) + ai_prompts.yaml
         - Example: system_prompt has en and zh_tw versions with different structures
         - Rule: DEV_R053 (this rule) governs this boundary

      ai_prompts.yaml locale format:
        system_prompt:
          en: "You are a professional marketing analyst..."
          zh_tw: "你是專業的行銷分析師..."
        user_prompt_template:
          en: "Based on the following data..."
          zh_tw: "根據以下資料..."

      If system_prompt is a plain string (no locale map), it is treated as the
      default locale. This ensures backward compatibility with existing prompts.

      load_openai_prompt() accepts optional locale parameter:
        prompt <- load_openai_prompt("report.integrated", locale = "zh_tw")
        # prompt$system_prompt -> zh_tw string directly

      Key constraint: The zh_tw prompt content MUST comply with UI_R025
      (Taiwan standard Chinese). Use Taiwan-standard terms — e.g., "資料"
      (not "數據" when meaning general data), "使用者" (not "用戶" when
      meaning general user). See UI_R025 for full mapping.

      NEVER use report_text(en, zh) or similar ad-hoc bilingual wrappers
      in R code. All locale-specific AI content goes in ai_prompts.yaml.

    rule_formal: |
      RULE DEV_R053_AI_PROMPT_LOCALE:

      # Two-mechanism boundary
      FOR content C:
        IF length(C) <= phrase AND is_ui_display:
          USE translate(C)
          STORE IN ui_terminology.csv
        ELIF is_ai_prompt:
          USE load_openai_prompt(key, locale)
          STORE IN ai_prompts.yaml

      # ai_prompts.yaml locale format
      FOR prompt_field IN [system_prompt, user_prompt_template]:
        IF type(prompt_field) == map{locale -> string}:
          load_openai_prompt(key, locale) -> prompt_field[locale]
        ELIF type(prompt_field) == string:
          load_openai_prompt(key, locale) -> prompt_field  # backward compatible

      # Compliance
      FOR ALL prompt_field.zh_tw:
        MUST comply_with UI_R025  # Taiwan standard Chinese

      # Prohibition
      NEVER define bilingual_wrapper(en, zh) IN R code
      NEVER hardcode prompt text IN R code

    violations:
      - "Using report_text(en, zh) to embed bilingual prompts in R code"
      - "Hardcoding Chinese prompt text in R functions"
      - "Storing AI prompt content in ui_terminology.csv"
      - "Using translate() for multi-paragraph AI prompt content"
      - "Using mainland Chinese terms in zh_tw prompts (UI_R025)"
    compliant:
      - "ai_prompts.yaml has system_prompt.en and system_prompt.zh_tw"
      - "load_openai_prompt('report.integrated', locale='zh_tw') returns zh_tw prompt"
      - "UI labels in report module still use translate() for short strings"
      - "Plain string system_prompt (no locale) works unchanged (backward compatible)"

    examples:
      bad: |
        # Bad: bilingual wrapper in R code
        report_text <- function(en, zh) {
          if (is_zh_ui) zh else en
        }
        title <- report_text("Customer Analysis", "客戶分析")

        # Bad: hardcoded Chinese prompt
        system_msg <- if (is_zh_ui) {
          "你是專業的電商行銷顧問..."
        } else {
          "You are a professional marketing analyst..."
        }

      good: |
        # Good: locale in ai_prompts.yaml
        # ai_prompts.yaml:
        #   report_generation:
        #     integrated_report:
        #       model: "gpt-5.2"
        #       system_prompt:
        #         en: "You are a professional marketing analyst..."
        #         zh_tw: "你是專業的行銷分析師..."

        # R code:
        locale <- if (is_zh_ui) "zh_tw" else "en"
        prompt <- load_openai_prompt("report_generation.integrated_report",
                                     locale = locale)
        # prompt$system_prompt is already the correct locale string

        # Short UI labels still use translate()
        showNotification(translate("Report generation complete!"))

    dependencies:
      - "DEV_R052"  # Canonical English keys — DEV_R053 extends, not replaces
      - "DEV_R050"  # Display data externalization — prompts also externalized
      - "UI_R025"   # Taiwan Chinese — applies to zh_tw prompts

    related:
      - "09-openai-integration"  # ai_prompts.yaml as single source of truth

    metadata:
      created: "2026-03-06"
      triggered_by: "PR #249 review — report_text() anti-pattern in reportIntegration.R"
      existing_anti_pattern: "reportIntegration.R uses report_text(en, zh) wrapper"

  - id: DEV_R055
    type: rule
    name: semantic_consistency_fallback
    display_name: "Semantic Consistency Fallback"
    one_liner: "Use explicit sentinel values when mapping/transformation fails, never NA"
    file_path: "CH03_development_methodology/rules/DEV_R055_semantic_consistency_fallback.qmd"
    derived_from: MP154

    rule_natural: |
      When a mapping, lookup, or transformation operation fails to resolve a value,
      the fallback must use an explicit sentinel value (e.g., "UNKNOWN") that preserves
      the column's semantic consistency. Never allow NA to silently replace a valid value.

      For ID columns: use "UNKNOWN". For category columns: use "Uncategorized".
      Always emit warning() with the original unmapped values and guidance on how to fix.

    rule_formal: |
      RULE DEV_R055_SEMANTIC_FALLBACK:
      FOR ALL mapping operations M on column C:
        IF M(value) cannot resolve:
          C[value] := sentinel_value
          warning(original_values, resolution_guidance)
        NEVER:
          C[value] := NA
          C[value] := original_value  # if C is an ID column

    violations:
      - "ifelse(!is.na(mapped), mapped, NA) — silent data loss"
      - "Preserving raw Amazon name in product_line_id column — mixed semantics"
    compliant:
      - "ifelse(!is.na(mapped), mapped, 'UNKNOWN') + warning()"
      - "Sentinel value visible in downstream aggregations as explicit group"

    dependencies:
      - "MP154"   # Side effect defense — this rule implements it
      - "MP029"   # No fake data — sentinels are markers, not fabrication

    metadata:
      created: "2026-03-14"
      triggered_by: "Issue #340 — unmapped product_line_id replaced with NA causing silent data loss"

