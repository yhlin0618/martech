    display_name: "Derivation Core Function Pattern"
    one_liner: "Extract shared derivation logic into core functions with thin platform wrappers"
    file_path: "CH03_development_methodology/rules/DEV_R038_derivation_core_function_pattern.qmd"

    rule_natural: |
      Core Function + Platform Wrapper architecture:
      - When same logic needed in 2+ platforms, extract to core function
      - Core functions go in DRV/all/fn_D{group}_{seq}_core.R
      - Platform wrappers are thin (~60 lines): init, source core, call, deinit
      - NO business logic in wrappers - all logic in core function
      - Wrapper headers must include CORE_FUNCTION marker

    rule_formal: |
      RULE DEV_R038_CORE_FUNCTION:
      IF derivation_logic in platforms.count >= 2
      THEN extract_to core_function(DRV/all/fn_D{group}_{seq}_core.R)

      FOR ALL platform_wrapper W:
      contains_only(W, [autoinit, source_core, call_core(platform_id), autodeinit])
      AND NOT contains_business_logic(W)
      AND header_includes(W, "CORE_FUNCTION")

    violations:
      - "Duplicating DNA calculation in cbz_D01_03.R and amz_D01_03.R"
      - "Business logic in wrapper instead of core function"
      - "Missing CORE_FUNCTION header in wrapper"
      - "Wrapper exceeds 80 lines"
    compliant:
