project:
  output-dir: _book/zh

book:
  title: "MAMBA 原則文檔"
  subtitle: "企業框架開發指南"
  author: "開發團隊"
  date: last-modified
  search: true
  sidebar:
    collapse-level: 2
  navbar:
    right:
      - text: "English"
        href: ../en/index.html

  chapters:
    - index.qmd
    - part: "CH00: 基礎原則"
      chapters:
        - docs/zh/part1_principles/CH00_fundamental_principles/index.qmd
    - part: "CH01: 結構組織"
      chapters:
        - docs/zh/part1_principles/CH01_structure_organization/rules/SO_R030_operational_documentation_location.qmd
        - docs/zh/part1_principles/CH01_structure_organization/rules/SO_R031_backup_file_management.qmd
    - part: "CH02: 資料管理"
      chapters:
        - docs/zh/part1_principles/CH02_data_management/rules/DM_R028_etl_data_type_separation.qmd
    - part: "CH05: 測試與部署"
      chapters:
        - docs/zh/part1_principles/CH05_testing_deployment/principles/TD_P001_deployment_patterns.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/principles/TD_P002_dual_testing_approach.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/principles/TD_P003_component_testing.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R001_shiny_test_data.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R002_test_app_building.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R003_test_script_initialization.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R004_standard_mock_database.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R005_docker_deployment_standard.qmd
        - docs/zh/part1_principles/CH05_testing_deployment/rules/TD_R006_deployment_driver_orchestration.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    number-sections: true
    lang: zh-TW

execute:
  freeze: auto
  echo: false
