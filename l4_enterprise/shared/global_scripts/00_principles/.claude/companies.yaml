# L4 Enterprise Company Registry
# ============================================================
# Central record of deployed Posit Connect URLs + deploy metadata.
# Purpose: Fast lookup of live dashboard URLs, avoid hunting through
#          Posit Connect each time someone needs to verify or debug a company.
#
# Issue: #377 (add .claude/companies.yaml registry)
# Related: #375 (unified deploy Makefile will auto-update last_deployed)
#          #376 (MAMBA live URL verified 2026-04-14)
#
# Update triggers:
#   - After each successful Posit Connect deploy → bump last_deployed
#   - After first deploy of a new company → add deployed_url
#   - After company archival → set status: archived
#
# Status values:
#   production      Live on Posit Connect, served to customers
#   template_source Base template used by /new-company skill
#   bootstrap       Partial setup (config incomplete or no deploy yet)
#   not_deployed    Config complete but deploy pending
#   unknown         Needs audit
#   archived        Historical, no longer maintained
#
# Schema version tracks breaking changes to this file's structure.
# ============================================================

