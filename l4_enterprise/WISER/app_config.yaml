# WISER Enterprise Platform Configuration
# L4 Enterprise Application
# Created: 2025-06-28
# Company: WISER

app:
  name: "WISER Enterprise Platform"
  version: "1.0.0"
  tier: "l4_enterprise"
  description: "Complete precision marketing solution for enterprise clients"

theme:
  version: 5
  bootswatch: cosmo
layout: navbar

brand_name: "WISER"
language: "zh_TW.UTF-8"
RAW_DATA_DIR: "./data/local_data/rawdata_WISER"
parameters_folder: "default"

# Environment variables should be in .env file
# OPENAI_API_KEY: [set in .env]
platform:
  - amz
  - officialwebsite

googlesheet:
  product_profile: "16-k48xxFzSZm2p8j9SZf4V041fldcYnR8ectjsjuxZQ"
  comment_property: "168GviZntUk2u12Agjh6Mi1yBMpNY-SQDT4y9p71QQ74"

# Components with their data sources - using all standard patterns
components:
  micro:
    microCustomer:
      primary: customer_details
      history: customer_history
    sales: sales_by_customer_dta
  
  macro:
    trends:
      data_source: sales_trends
      parameters:
        show_kpi: true
        refresh_interval: 300

# Deployment settings
deployment:
  main_file: "scripts/global_scripts/10_rshinyapp_components/unions/union_production_test.R"  # 主要應用檔案
  target: "posit_connect"
  url: "https://connect.posit.cloud"
  account_name: "kyle-lin"
  app_name: "wiser-enterprise"
  app_id: "wiser-enterprise"
  title: "WISER Enterprise Platform"
