# BrandEdge Configuration

# Basic app information
app_info:
  name: "BrandEdge - Brand Imprint Engine"
  description: "Brand imprint analysis and positioning engine"
  version: "17.0"
  language: "zh_TW.UTF-8"

# UI/Theme settings
theme:
  version: 5
  bootswatch: cosmo

# Data settings
data:
  cache_dir: "./cache"
  database_dir: "./database"

# Deployment configuration
deployment:
  # Deployment target (shinyapps or connect)
  target: "connect"
  
  # GitHub repository info
  github_repo: "kiki830621/positioning_app"
  app_path: "."
  main_file: "full_app_v17.R"
  branch: "main"
  
  # ShinyApps.io settings (if target=shinyapps)
  shinyapps:
    account: "your-account-name"
    app_name: "positioning_app"
  
  # Posit Connect Cloud vanity URL (set after deployment)
  vanity_url: "brandedge"
  
# Version files for BrandEdge
version_files:
  - "full_app_v17.R"
  - "full_app_v16.R"
  - "full_app_v15.R"
  - "full_app_v14.R"
  
# Required files to check before deployment
required_files:
  - "app.R"
  - "manifest.json"
  - ".gitignore"
  
# Required directories
required_dirs:
  - "www"
  - "icons"
  - "scripts"
  - "data"
  
# Environment variables needed (from .env)
env_vars:
  - "PGHOST"
  - "PGPORT"
  - "PGUSER"
  - "PGPASSWORD"
  - "PGDATABASE"
  - "PGSSLMODE"
  - "OPENAI_API_KEY"
  
# Special instructions for BrandEdge
special_instructions: |
  - Ensure all environment variables are set in Posit Connect Cloud
  - The app uses PostgreSQL database, make sure connection is available
  - Check that www/ folder contains necessary static assets
  - Application name: Brand Imprint Engine (品牌印記引擎)

# Components configuration
components:
  positioning:
    data_source: "item_property_dictionary"
    features:
      - "market_analysis"
      - "competitor_comparison"
      - "positioning_matrix" 

